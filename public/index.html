function renderHMx(){
  // If no teams selected, show prompt — avoids rendering 3000+ matches
  if(H_TRACKED_FILTER.size===0){
    document.getElementById('pg-matches').innerHTML=`
<div class="sh"><h2>Match <span>Log</span></h2><span class="sub">Houston 2026 season history</span></div>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:16px">
  <div style="font-size:32px;opacity:.4">📋</div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)">No Teams Selected</div>
  <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3);max-width:360px;line-height:1.6">Use the <strong style="color:var(--text2)">Team Tracking</strong> pill in the status bar to select teams and view their match history here.</div>
  <button onclick="openTeamTrackingPopup()" style="margin-top:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:8px 20px;border-radius:6px;cursor:pointer;background:rgba(0,230,100,.15);border:1px solid rgba(0,230,100,.4);color:var(--green)">Open Team Tracking</button>
</div>`;
    return;
  }

  let ms=MATCH_TYPE==='qm'?hallM.filter(m=>m.comp_level==='qm'):MATCH_TYPE==='po'?hallM.filter(m=>m.comp_level!=='qm'):hallM;

  // Build per-team match lists for selected teams only
  const teamMatchMap={};
  ms.forEach(m=>{
    const allKeys=[...(m.alliances?.red?.team_keys||[]),...(m.alliances?.blue?.team_keys||[])];
    allKeys.forEach(k=>{
      const num=parseInt(k.replace('frc',''));
      if(!H_TRACKED_FILTER.has(num)) return;
      if(!teamMatchMap[num]) teamMatchMap[num]=[];
      if(!teamMatchMap[num].find(x=>x.key===m.key)) teamMatchMap[num].push(m);
    });
  });

  // Sort teams: in TRACKED order first, then by team number
  let teamNums=[...H_TRACKED_FILTER];
  teamNums.sort((a,b)=>{
    const aIdx=TRACKED.indexOf(a), bIdx=TRACKED.indexOf(b);
    if(aIdx>-1&&bIdx>-1) return aIdx-bIdx;
    if(aIdx>-1) return -1;
    if(bIdx>-1) return 1;
    return a-b;
  });

  // Sort each team's matches by match order
  const lo={qm:0,qf:1,sf:2,f:3};
  teamNums.forEach(num=>{
    if(!teamMatchMap[num]) teamMatchMap[num]=[];
    teamMatchMap[num].sort((a,b)=>
      (lo[a.comp_level]||0)-(lo[b.comp_level]||0)||
      (a.set_number||0)-(b.set_number||0)||
      a.match_number-b.match_number
    );
  });

  const totalMatches=new Set(teamNums.flatMap(n=>(teamMatchMap[n]||[]).map(m=>m.key))).size;
  const aceLoaded=Object.keys(HDB.ace).length>0||Object.keys(HDB.matchPreds).length>0;
  document.getElementById('pg-matches').innerHTML=`

<div class="card" style="padding:0"><div class="tw tw-scroll">${renderHMxTable(teamNums,teamMatchMap,aceLoaded)}</div></div>`;
}

function renderHMxTable(teamNums,teamMatchMap,aceLoaded){
  if(!teamNums.length) return`<div class="empty"><div class="empty-s">No matches in current filter.</div></div>`;
  function aceWinProbH(redKeys,blueKeys,matchKey){
    const sbPred=HDB.matchPreds[matchKey];
    if(sbPred&&sbPred.winner&&sbPred.prob!=null){
      return{red:sbPred.prob,blue:1-sbPred.prob,source:'epa'};
    }
    const redAce=redKeys.reduce((s,k)=>{const a=HDB.ace[parseInt(k.replace('frc',''))];return s+(a?.ace??0);},0);
    const blueAce=blueKeys.reduce((s,k)=>{const a=HDB.ace[parseInt(k.replace('frc',''))];return s+(a?.ace??0);},0);
    if(!redAce&&!blueAce) return null;
    const redProb=1/(1+Math.exp(-(redAce-blueAce)/30));
    return{red:redProb,blue:1-redProb,source:'ace'};
  }
  return`<table style="table-layout:fixed;width:100%"><colgroup>
    <col style="width:60px"/><col style="width:46px"/><col style="width:54px"/><col style="width:58px"/>
    <col style="width:calc(50% - 191px)"/><col style="width:48px"/><col style="width:10px"/>
    <col style="width:48px"/><col style="width:calc(50% - 191px)"/>
    <col style="width:${aceLoaded?'80px':'56px'}"/><col style="width:${aceLoaded?'52px':'0px'}"/>
  </colgroup>
  <thead><tr>
    <th>Event</th><th>Type</th><th class="r">Match</th><th></th>
    <th style="color:rgba(255,61,90,.7)">Red Alliance</th>
    <th class="r" style="color:var(--loss)">Red</th><th></th>
    <th style="color:var(--blue)">Blue</th>
    <th style="color:rgba(56,168,255,.7)">Blue Alliance</th>
    <th class="r">${aceLoaded?'Pred':'Winner'}</th>
    ${aceLoaded?'<th class="r">Result</th>':''}
  </tr></thead>
  <tbody>${(()=>{
    const colSpan=aceLoaded?11:10;
    return teamNums.flatMap(teamNum=>{
      const teamKey=`frc${teamNum}`;
      const teamName=(HDB.teams||[]).find(t=>t.num===teamNum)?.name||String(teamNum);
      const isTracked=TRACKED.includes(teamNum);
      const tc=teamColor(teamNum);
      const tcColor=tc?tc.text:'var(--text2)';
      const tcBorder=tc?tc.border:'var(--border2)';
      const tcBg=tc?`rgba(${parseInt(tc.border.slice(1,3),16)},${parseInt(tc.border.slice(3,5),16)},${parseInt(tc.border.slice(5,7),16)},.07)`:'rgba(255,255,255,.03)';
      const headerRow=`<tr style="background:${tcBg};border-top:2px solid ${isTracked?tcBorder:'var(--border2)'}">
        <td colspan="${colSpan}" style="padding:6px 12px">
          <div style="display:flex;align-items:center;gap:10px">
            ${tc?`<span style="width:8px;height:8px;border-radius:50%;background:${tcBorder};flex-shrink:0"></span>`:''}
            <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:${tcColor}">${teamNum}</span>
            <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;color:${tcColor};opacity:.8">${teamName}</span>
            ${isTracked?`<span style="font-size:10px;color:${tcColor};font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;opacity:.7">★ TRACKED</span>`:''}
            <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto">${teamMatchMap[teamNum].length} matches</span>
          </div>
        </td>
      </tr>`;
      const matchRows=teamMatchMap[teamNum].map(m=>{
    const redKeys=m.alliances?.red?.team_keys||[];
    const blueKeys=m.alliances?.blue?.team_keys||[];
    const rt=redKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${k.replace('frc','')}</span>`;}).join(' · ');
    const bt=blueKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${k.replace('frc','')}</span>`;}).join(' · ');
    const rs=m.alliances?.red?.score??'–',bs=m.alliances?.blue?.score??'–',w=m.winning_alliance;
    const hasT=[...redKeys,...blueKeys].some(k=>isTr(k));
    const rWin=w==='red',bWin=w==='blue';
    const prob=aceLoaded?aceWinProbH(redKeys,blueKeys,m.key):null;
    const resultBadge=rWin?`<span class="rp" style="background:rgba(255,61,90,.12);color:var(--loss)">RED</span>`:bWin?`<span class="rp" style="background:rgba(56,168,255,.12);color:var(--blue)">BLUE</span>`:`<span class="rp rt">TIE</span>`;
    let predCell='',resultCell='';
    if(aceLoaded){
      if(!prob){predCell=`<span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">–</span>`;}
      else{
        const predRed=prob.red>=0.5;
        const pct=Math.round((predRed?prob.red:prob.blue)*100);
        const predLabel=predRed?`<span style="color:var(--loss);font-family:'JetBrains Mono',monospace;font-size:11px">RED</span>`:`<span style="color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px">BLUE</span>`;
        const srcTag=prob.source==='epa'?`<span style="font-size:8px;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;opacity:.8"> EPA</span>`:`<span style="font-size:8px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;opacity:.8"> ACE</span>`;
        predCell=`${predLabel}<span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px"> ${pct}%</span>${srcTag}`;
      }
      resultCell=resultBadge;
    }
    const typeLabel={qm:'QUAL',qf:'QF',sf:'SF',f:'FINAL'}[m.comp_level]||m.comp_level.toUpperCase();
    const isUnplayed=(m.alliances?.red?.score??-1)<0;
    const bdId=`hbd-${m.key}`;
    const colSpan=aceLoaded?11:10;
    const bdPanel=(()=>{
      if(isUnplayed) return '';
      const rhs=hubS(m,'red'), bhs=hubS(m,'blue');
      if(!rhs&&!bhs) return '';
      const bdPhases=[
        {label:'Auto',      k:'auto',      col:'var(--blue)'},
        {label:'Transition',k:'transition',col:'var(--text2)'},
        {label:'Sh 1 / 2', k1:'s1',k2:'s2',col:'#a78bfa'},
        {label:'Sh 3 / 4', k1:'s3',k2:'s4',col:'#a78bfa'},
        {label:'Endgame',   k:'endgame',   col:'var(--orange)'},
        {label:'Teleop',    k:'teleop',    col:'#00c8aa',sub:true},
        {label:'Total',     k:'total',     col:'var(--green)',total:true},
      ];
      const f=(hs,p)=>p.k1!=null?((hs?hs[p.k1]:0)||0)+((hs?hs[p.k2]:0)||0):(hs?hs[p.k]:0)||0;
      const maxV=Math.max(...bdPhases.map(p=>Math.max(f(rhs,p),f(bhs,p))),1);
      const makeRow=(p)=>{
        const rv=f(rhs,p),bv=f(bhs,p);
        const isTotal=!!p.total,isSub=!!p.sub;
        const pctR=Math.round((rv/maxV)*100),pctB=Math.round((bv/maxV)*100);
        const rCol=rWin&&isTotal?'var(--loss)':rv>bv?'rgba(255,100,100,.9)':'var(--text3)';
        const bCol=bWin&&isTotal?'var(--blue)':bv>rv?'rgba(80,180,255,.9)':'var(--text3)';
        const barR=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctR}%;height:100%;background:var(--loss);opacity:${rWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;right:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${rCol}">${rv}</div></div>`;
        const barB=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctB}%;height:100%;background:var(--blue);opacity:${bWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;left:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;padding-left:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${bCol}">${bv}</div></div>`;
        const topStyle=isTotal?'padding-top:8px;border-top:1px solid var(--border);margin-top:6px':isSub?'padding-top:5px;border-top:1px dashed rgba(255,255,255,.1);margin-top:2px;margin-bottom:4px':'margin-bottom:4px';
        return`<div style="display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;gap:8px;${topStyle}">${barR}<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:${isTotal||isSub?900:700};font-size:${isTotal?'11':'10'}px;letter-spacing:.08em;text-transform:uppercase;color:${isTotal?'var(--text2)':p.col}">${p.label}${isSub?'<div style="font-size:8px;font-weight:400;color:var(--text3);letter-spacing:.04em;margin-top:1px">subtotal</div>':''}</div>${barB}</div>`;
      };
      return`<tr id="${bdId}" class="mx-bd"><td colspan="${colSpan}" style="padding:0"><div style="padding:14px 24px 16px">
        <div style="display:grid;grid-template-columns:1fr 90px 1fr;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div style="text-align:right;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${rWin?'var(--loss)':'var(--text3)'}">RED ALLIANCE</div>
          <div></div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${bWin?'var(--blue)':'var(--text3)'}">BLUE ALLIANCE</div>
        </div>
        ${bdPhases.map(makeRow).join('')}
        <div style="margin-top:10px;text-align:right;font-size:9px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase">Alliance totals · click row to close</div>
      </div></td></tr>`;
    })();
    const clickable=!isUnplayed&&bdPanel?`style="cursor:pointer" onclick="const r=document.getElementById('${bdId}');if(r)r.classList.toggle('open')"` :'';
    return`<tr ${clickable}>
      <td class="dim" style="font-size:10px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(m._hev||'').replace('2026','').toUpperCase()}</td>
      <td class="dim" style="font-size:10px;font-family:'Barlow Condensed',monospace;font-weight:700;letter-spacing:.06em">${typeLabel}</td>
      <td class="r dim" style="white-space:nowrap">${m.comp_level==='qm'?m.match_number:`${m.set_number}-${m.match_number}`}</td>
      <td class="r" style="padding:0 2px">${videoLink(matchVideoUrl(m))}</td>
      <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${rt}</td>
      <td class="r" style="${rWin?'color:var(--win);font-weight:600':bWin?'color:var(--text3)':'color:var(--text3)'}">${rs}</td>
      <td class="dim" style="text-align:center;font-size:10px">–</td>
      <td class="r" style="${bWin?'color:var(--win);font-weight:600':rWin?'color:var(--text3)':'color:var(--text3)'}">${bs}</td>
      <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${bt}</td>
      <td class="r" style="white-space:nowrap">${aceLoaded?predCell:resultBadge}</td>
      ${aceLoaded?`<td class="r">${resultCell}</td>`:''}
    </tr>${bdPanel}`;
      }).join('');
      return headerRow+matchRows;
    }).join('');
  })()}</tbody></table>`;
}

// ════════ MATCH LOG ════════
function renderMx(){
  const fM=filteredMatches();
  const ms = MATCH_TYPE==='qm' ? fM.filter(m=>m.comp_level==='qm')
           : MATCH_TYPE==='po' ? fM.filter(m=>m.comp_level!=='qm')
           : fM;

  document.getElementById('pg-matches').innerHTML=`
<div class="sh"><h2>Match <span>Log</span></h2><span class="sub">${fM.filter(m=>m.comp_level==='qm').length} qual · ${fM.filter(m=>m.comp_level!=='qm').length} playoff matches${filterLabel()}</span></div>
${ACTIVE_FILTER.size?`<div class="pending-banner" style="background:rgba(0,230,100,.06);border-color:rgba(0,230,100,.3);margin-bottom:12px">🔍 Pill filter active.</div>`:''}
<div class="sr">
  <input type="text" class="si" id="mxTm" placeholder="Filter by team #…" oninput="filterMx()" style="width:180px"/>
</div>
<div class="card" style="padding:0"><div class="tw tw-scroll" id="mxTbl">${renderMxTable(ms)}</div></div>`;}
function filterMx(){
  const team=document.getElementById('mxTm').value.trim();
  let ms=filteredMatches();
  if(MATCH_TYPE==='qm') ms=ms.filter(m=>m.comp_level==='qm');
  else if(MATCH_TYPE==='po') ms=ms.filter(m=>m.comp_level!=='qm');
  if(team) ms=ms.filter(m=>[...(m.alliances?.red?.team_keys||[]),...(m.alliances?.blue?.team_keys||[])].some(k=>k.includes(team)));
  document.getElementById('mxTbl').innerHTML=renderMxTable(ms);}
function renderMxTable(matches){
  // Determine priority week: unplayed matches first, then active event, then chronological
  const unplayedWks=new Set(matches.filter(m=>(m.alliances?.red?.score??-1)<0).map(m=>m._wk));
  const activeWk=EVENTS.find(ev=>evStatus(ev)==='active')?._wk??null;
  const priorityWk=unplayedWks.size>0?Math.min(...unplayedWks):activeWk;
  const sorted=[...matches].sort((a,b)=>{
    const aP=a._wk===priorityWk?0:1;
    const bP=b._wk===priorityWk?0:1;
    if(aP!==bP) return aP-bP;
    if(a._wk!==b._wk) return (a._wk||0)-(b._wk||0);
    const lo={qm:0,qf:1,sf:2,f:3};
    return(lo[a.comp_level]||0)-(lo[b.comp_level]||0)||(a.set_number||0)-(b.set_number||0)||a.match_number-b.match_number;
  });
  const {col:mc,dir:md}=SORT.mx;
  if(mc){
    const lo={qm:0,qf:1,sf:2,f:3};
    sorted.sort((a,b)=>{
      let av,bv;
      if(mc==='ev')   {av=a._wk||0;bv=b._wk||0;}
      else if(mc==='type'){av=lo[a.comp_level]||0;bv=lo[b.comp_level]||0;}
      else if(mc==='match'){av=a.match_number||0;bv=b.match_number||0;}
      else if(mc==='red') {av=a.alliances?.red?.score??-1;bv=b.alliances?.red?.score??-1;}
      else if(mc==='pred') {
        const pA=DB.matchPreds[a.key];const pB=DB.matchPreds[b.key];
        av=pA?.prob??-1;bv=pB?.prob??-1;
      }
      else if(mc==='result'){const rA=a.winning_alliance;const rB=b.winning_alliance;av=rA?1:0;bv=rB?1:0;}
      return(av-bv)*md;
    });
  }
  const aceLoaded=Object.keys(ACE_DATA).length>0 || Object.keys(DB.matchPreds).length>0;
  // Format a TBA Unix timestamp as local time string
  function fmtMatchTime(m){
    const t=m.predicted_time||m.scheduled_time||null;
    if(!t) return '';
    const d=new Date(t*1000);
    return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  }
  // Win probability from ACE: logistic function of ACE sum difference
  function aceWinProb(redKeys, blueKeys, matchKey){
    // Prefer Statbotics EPA prediction if available
    const sbPred = DB.matchPreds[matchKey];
    if (sbPred && sbPred.winner && sbPred.prob != null) {
      // sbPred.prob is always red_win_prob (0-1 from Red's perspective)
      const redProb  = sbPred.prob;
      const blueProb = 1 - sbPred.prob;
      return { red: redProb, blue: blueProb, source: 'epa' };
    }
    // Fallback: ACE-based sigmoid calculation
    const redAce=redKeys.reduce((s,k)=>{const a=ACE_DATA[parseInt(tnum(k))];return s+(a?.ace??0);},0);
    const blueAce=blueKeys.reduce((s,k)=>{const a=ACE_DATA[parseInt(tnum(k))];return s+(a?.ace??0);},0);
    if(redAce===0&&blueAce===0) return null;
    const diff=redAce-blueAce;
    const redProb=1/(1+Math.exp(-diff/30));
    return {red:redProb, blue:1-redProb, redAce, blueAce, source: 'ace'};
  }
  return`<table style="table-layout:fixed;width:100%"><colgroup>
    <col style="width:52px"/>
    <col style="width:46px"/>
    <col style="width:54px"/>
    <col style="width:58px"/>
    <col style="width:calc(50% - 187px)"/>
    <col style="width:48px"/>
    <col style="width:10px"/>
    <col style="width:48px"/>
    <col style="width:calc(50% - 187px)"/>
    <col style="width:${aceLoaded?'80px':'56px'}"/>
    <col style="width:${aceLoaded?'52px':'0px'}"/>
  </colgroup>
  <thead><tr>
    <th style="cursor:pointer;user-select:none" onclick="setSort('mx','ev')">Event</th>
    <th style="cursor:pointer;user-select:none" onclick="setSort('mx','type')">Type</th>
    <th class="r" style="cursor:pointer;user-select:none" onclick="setSort('mx','match')">Match</th>
    <th></th>
    <th style="color:rgba(255,61,90,.7)">Red Alliance</th>
    <th class="r" style="color:var(--loss);cursor:pointer;user-select:none" onclick="setSort('mx','red')">Red</th>
    <th></th>
    <th style="color:var(--blue)">Blue</th>
    <th style="color:rgba(56,168,255,.7)">Blue Alliance</th>
    <th class="r" style="cursor:pointer;user-select:none" onclick="setSort('mx','pred')">${aceLoaded?'Pred':'Winner'}</th>
    ${aceLoaded?'<th class="r" style="cursor:pointer;user-select:none" onclick="setSort(\'mx\',\'result\')">Result</th>':''}
  </tr></thead>
  <tbody>${(()=>{ let lastEv=null; return sorted.map(m=>{
    const redKeys=m.alliances?.red?.team_keys||[];
    const blueKeys=m.alliances?.blue?.team_keys||[];
    const rt=redKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${tnum(k)}</span>`;}).join(' · ');
    const bt=blueKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${tnum(k)}</span>`;}).join(' · ');
    const rs=m.alliances?.red?.score??'–',bs=m.alliances?.blue?.score??'–',w=m.winning_alliance;
    const hasT=[...redKeys,...blueKeys].some(isTr);
    const rWin=w==='red', bWin=w==='blue';
    const prob=aceLoaded?aceWinProb(redKeys,blueKeys,m.key):null;
    const resultBadge=rWin
      ?`<span class="rp" style="background:rgba(255,61,90,.12);color:var(--loss)">RED</span>`
      :bWin
        ?`<span class="rp" style="background:rgba(56,168,255,.12);color:var(--blue)">BLUE</span>`
        :`<span class="rp rt">TIE</span>`;
    let predCell='', resultCell='';
    if(aceLoaded){
      if(!prob){
        predCell=`<span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">–</span>`;
      } else {
        const predRed=prob.red>=0.5;
        const upset=w&&((predRed&&bWin)||(!predRed&&rWin));
        const pct=Math.round((predRed?prob.red:prob.blue)*100);
        const predLabel=predRed
          ?`<span style="color:var(--loss);font-family:'JetBrains Mono',monospace;font-size:11px">RED</span>`
          :`<span style="color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:11px">BLUE</span>`;
        const upsetBadge=upset?`<span style="color:var(--orange)" title="Upset — predicted ${predRed?'RED':'BLUE'} but ${w.toUpperCase()} won"> ⚡</span>`:'';
        const srcTag=prob.source==='epa'
          ?`<span style="font-size:8px;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;opacity:.8"> EPA</span>`
          :`<span style="font-size:8px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em;opacity:.8"> ACE</span>`;
        predCell=`${predLabel}<span style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px"> ${pct}%</span>${srcTag}${upsetBadge}`;
      }
      resultCell=resultBadge;
    }
    const isUnplayed=(m.alliances?.red?.score??-1)<0;
    const matchTime=fmtMatchTime(m);
    const timOrVid=isUnplayed&&matchTime
      ?`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);white-space:nowrap">${matchTime}</span>`
      :videoLink(matchVideoUrl(m));
    const colSpan=aceLoaded?11:10;
    const evBoundary=m._ev!==lastEv&&lastEv!==null
      ?`<tr><td colspan="${colSpan}" style="padding:0;border-top:2px solid var(--border2);background:transparent"></td></tr>`
      :'';
    lastEv=m._ev;
    const bdId=`bd-${m.key}`;
    // Build breakdown panel for played matches
    const bdPanel=(()=>{
      if(isUnplayed) return '';
      const rhs=hubS(m,'red'), bhs=hubS(m,'blue');
      if(!rhs&&!bhs) return '';
      const bdPhases=[
        {label:'Auto',       k:'auto',      col:'var(--blue)'},
        {label:'Transition', k:'transition',col:'var(--text2)'},
        {label:'Sh 1 / 2',  k1:'s1',k2:'s2', col:'#a78bfa'},
        {label:'Sh 3 / 4',  k1:'s3',k2:'s4', col:'#a78bfa'},
        {label:'Endgame',   k:'endgame',   col:'var(--orange)'},
        {label:'Teleop',    k:'teleop',    col:'#00c8aa',sub:true},
        {label:'Total',     k:'total',     col:'var(--green)',total:true},
      ];
      const f=(hs,p)=>p.k1!=null?((hs?hs[p.k1]:0)||0)+((hs?hs[p.k2]:0)||0):(hs?hs[p.k]:0)||0;
      const maxV=Math.max(...bdPhases.map(p=>Math.max(f(rhs,p),f(bhs,p))),1);
      const makeRow=(p)=>{
        const rv=f(rhs,p),bv=f(bhs,p);
        const isTotal=!!p.total,isSub=!!p.sub;
        const pctR=Math.round((rv/maxV)*100),pctB=Math.round((bv/maxV)*100);
        const rCol=rWin&&isTotal?'var(--loss)':rv>bv?'rgba(255,100,100,.9)':'var(--text3)';
        const bCol=bWin&&isTotal?'var(--blue)':bv>rv?'rgba(80,180,255,.9)':'var(--text3)';
        const barR=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctR}%;height:100%;background:var(--loss);opacity:${rWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;right:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${rCol}">${rv}</div></div>`;
        const barB=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctB}%;height:100%;background:var(--blue);opacity:${bWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;left:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;padding-left:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${bCol}">${bv}</div></div>`;
        const topStyle=isTotal?'padding-top:8px;border-top:1px solid var(--border);margin-top:6px':isSub?'padding-top:5px;border-top:1px dashed rgba(255,255,255,.1);margin-top:2px;margin-bottom:4px':'margin-bottom:4px';
        return`<div style="display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;gap:8px;${topStyle}">${barR}<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:${isTotal||isSub?900:700};font-size:${isTotal?'11':'10'}px;letter-spacing:.08em;text-transform:uppercase;color:${isTotal?'var(--text2)':p.col}">${p.label}${isSub?'<div style="font-size:8px;font-weight:400;color:var(--text3);letter-spacing:.04em;margin-top:1px">subtotal</div>':''}</div>${barB}</div>`;
      };
      return`<tr id="${bdId}" class="mx-bd"><td colspan="${colSpan}" style="padding:0"><div style="padding:14px 24px 16px">
        <div style="display:grid;grid-template-columns:1fr 90px 1fr;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
          <div style="text-align:right;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${rWin?'var(--loss)':'var(--text3)'}">RED ALLIANCE</div>
          <div></div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${bWin?'var(--blue)':'var(--text3)'}">BLUE ALLIANCE</div>
        </div>
        ${bdPhases.map(makeRow).join('')}
        <div style="margin-top:10px;text-align:right;font-size:9px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase">Alliance totals · click row to close</div>
      </div></td></tr>`;
    })();
    const clickable=!isUnplayed&&bdPanel?`style="cursor:pointer" onclick="const r=document.getElementById('${bdId}');if(r)r.classList.toggle('open')"` :'';
    return`${evBoundary}<tr class="${hasT?'hl':''}" ${clickable}>
      <td><span class="badge ${m._ec}">${m._esh}</span></td>
      <td><span style="font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;color:var(--text3)">${m.comp_level==='qm'?'QUAL':m.comp_level==='f'?'FINAL':m.comp_level==='sf'?'SF':m.comp_level.toUpperCase()}</span></td>
      <td class="r dim" style="white-space:nowrap">${m.comp_level==='qm'?m.match_number:`${m.set_number}-${m.match_number}`}</td>
      <td style="padding:0 4px">${timOrVid}</td>
      <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${rWin?'background:rgba(255,61,90,.04)':''}">${rt}</td>
      <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:${rWin?700:400};color:${rWin?'var(--loss)':'var(--text3)'};${rWin?'background:rgba(255,61,90,.04)':''}">${rs}</td>
      <td style="text-align:center;color:var(--text3);font-size:10px;padding:0 2px">–</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:${bWin?700:400};color:${bWin?'var(--blue)':'var(--text3)'};${bWin?'background:rgba(56,168,255,.04)':''}">${bs}</td>
      <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${bWin?'background:rgba(56,168,255,.04)':''}">${bt}</td>
      <td class="r" style="white-space:nowrap">${aceLoaded?predCell:resultBadge}</td>
      ${aceLoaded?`<td class="r">${resultCell}</td>`:''}
    </tr>${bdPanel}`;}).join('')})()}</tbody></table>`;}

// Double-tap logo on mobile / triple-click on desktop to toggle admin mode
(function(){
  const logo=document.getElementById('logoImg');
  if(!logo) return;
  let tapCount=0, tapTimer=null, lastTouch=0;
  // Mobile: double-tap via touchend (prevents iOS zoom interference)
  logo.addEventListener('touchend',function(e){
    const now=Date.now();
    if(now-lastTouch<400){
      e.preventDefault(); // block iOS double-tap zoom
      tapCount++;
      if(tapCount>=2){
        tapCount=0;
        const el=document.getElementById('adminBtns');
        setAdminMode(!(el&&el.style.display==='flex'));
        logo.style.opacity='0.5';
        setTimeout(()=>logo.style.opacity='1',300);
      }
    } else {
      tapCount=1;
    }
    lastTouch=now;
  },{passive:false});
  // Desktop: triple-click
  logo.addEventListener('click',function(e){
    if(e.pointerType==='touch') return; // handled by touchend above
    tapCount++;
    clearTimeout(tapTimer);
    tapTimer=setTimeout(()=>{ tapCount=0; },600);
    if(tapCount>=3){
      clearTimeout(tapTimer);
      tapCount=0;
      const el=document.getElementById('adminBtns');
      setAdminMode(!(el&&el.style.display==='flex'));
      logo.style.opacity='0.5';
      setTimeout(()=>logo.style.opacity='1',300);
    }
  });
})();

// Start
init();
</script>
