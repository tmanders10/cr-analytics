<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050505;--bg2:#0a0a0a;--bg3:#111111;--border:rgba(0,230,100,0.08);--border2:rgba(0,230,100,0.18);--green:#00e664;--green2:#00b84e;--green4:rgba(0,230,100,0.05);--win:#00e664;--loss:#ff3d5a;--blue:#38a8ff;--orange:#ff8c42;--text:#ffffff;--text2:#c8d8ce;--text3:#8aa090;--card:#0e110e;--card2:#151815;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,100,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,100,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
  .shell{position:relative;z-index:1}
  .header{background:#060906;border-bottom:1px solid var(--border2);padding:0 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;height:60px;box-shadow:0 1px 24px rgba(0,230,100,.07)}
  .logo-img{width:38px;height:38px;object-fit:contain;flex-shrink:0}
  .logo-svg{width:38px;height:38px;flex-shrink:0}
  .header-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.06em;color:var(--green);text-transform:uppercase;white-space:nowrap;line-height:1}
  .header-logo small{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--text3);margin-top:2px}
  .hdiv{width:1px;height:28px;background:var(--border2)}
  .header-sub{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.1em;text-transform:uppercase;color:#8aa090}
  .hspacer{flex:1}
  .data-info{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);text-align:right;line-height:1.4}
  .data-info a{color:var(--green);text-decoration:none}
  .data-info a:hover{text-decoration:underline}
  .refresh-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:5px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .refresh-btn:hover{border-color:var(--green);color:var(--green)}
  .refresh-btn.loading{border-color:var(--green);color:var(--green);animation:pulse 1s infinite}
  .refresh-btn:disabled{opacity:.5;cursor:not-allowed}
  .status-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 24px;display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);min-height:34px;flex-wrap:wrap;position:sticky;top:60px;z-index:99;box-shadow:0 1px 8px rgba(0,0,0,.3)}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .sdot.loading{background:var(--green);animation:pulse 1s infinite}
  .sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
  .sdot.error{background:var(--loss)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .ev-pills{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;align-items:center}
  .mtype-pills{display:flex;gap:4px;align-items:center}
  .mtype-pill{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.08em;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;border:1px solid var(--border2);color:var(--text3);cursor:pointer;transition:all .2s;background:transparent}
  .mtype-pill:hover{border-color:var(--green);color:var(--green)}
  .mtype-pill.on{border-color:var(--green);color:#030803;background:var(--green)}
  .ev-pill{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.08em;border:1px solid var(--border2);color:var(--text3);transition:all .2s;cursor:default}
  .ev-pill.loaded{border-color:rgba(56,168,255,.4);color:rgba(56,168,255,.6);cursor:pointer}
  .ev-pill.loaded:hover{border-color:var(--blue);color:var(--blue)}
  .ev-pill.loaded.on{border-color:var(--blue);color:#030803;background:var(--blue);box-shadow:0 0 8px rgba(56,168,255,.35)}
  .pills-divider{width:1px;height:16px;background:rgba(0,230,100,.2);flex-shrink:0;margin:0 2px}
  .pills-row{display:none} /* hidden on desktop — shown on mobile as second line */
  .guide-btn-icon{display:none}
  .filter-hint{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-right:4px;white-space:nowrap}
  .nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:94px;z-index:98;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .nav-tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:13px 14px 11px;color:#8aa090;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
  .nav-tab:hover{color:#c8d8ce}
  .nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
  .mx-bd{display:none;background:var(--bg2);border-top:1px solid var(--border)}
  .mx-bd.open{display:table-row}
  .page{display:none}.page.active{display:block}
  .sh{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
  .sh h2{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:.03em;text-transform:uppercase}
  .sh h2 span{color:var(--green)}
  .sh .sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--green),transparent 60%);opacity:0;transition:opacity .3s}
  .card:hover::after{opacity:1}
  .ctitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
  .metric{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 18px;position:relative}
  .metric::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--green);border-radius:0 2px 2px 0;opacity:.5}
  .mlabel{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
  .mval{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:34px;color:var(--green);line-height:1}
  .msub{font-size:11px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace}
  .tw{overflow-x:auto}
  .tw-scroll{overflow:auto;max-height:calc(100vh - 220px)}
  .tw-scroll thead th{position:sticky;top:0;z-index:10;background:var(--bg2);box-shadow:0 1px 0 var(--border2);}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:7px 11px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap}
  thead th.r{text-align:right}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
  tbody tr:hover{background:var(--green4)}
  tbody tr.hl{background:rgba(0,230,100,.05);border-left:2px solid var(--green)}
  tbody tr.hl:hover{background:rgba(0,230,100,.09)}
  tbody td{padding:8px 11px}
  tbody td.r{text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px}
  tbody td.dim{color:var(--text3)}
  .rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;background:var(--bg3);color:var(--text2)}
  .rk.top{background:var(--green);color:#030803}
  .tlink{color:var(--green);text-decoration:none;font-weight:500}
  .tlink:hover{text-decoration:underline}
  .tnsm{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-left:5px}
  .bt{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
  .bf{height:100%;border-radius:3px;transition:width .5s ease}
  .bg{background:var(--green)}.bb{background:var(--blue)}.bo{background:var(--orange)}.btl{background:#00c8aa}
  .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
  .ev-dal{background:rgba(56,168,255,.12);color:#38a8ff}
  .ev-gwi{background:rgba(255,140,66,.12);color:#ff8c42}
  .ev-col{background:rgba(0,200,170,.12);color:#00c8aa}
  .ev-alb{background:rgba(0,230,100,.12);color:var(--green)}
  .ev-gai{background:rgba(180,100,255,.12);color:#b464ff}
  .ev-cmp{background:rgba(255,61,90,.12);color:var(--loss)}
  .rp{display:inline-block;padding:2px 7px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.06em}
  .rw{background:rgba(0,230,100,.12);color:var(--green)}
  .rl{background:rgba(255,61,90,.12);color:var(--loss)}
  .rt{background:rgba(122,143,128,.1);color:var(--text2)}
  .hbars{display:flex;align-items:flex-end;gap:3px;height:90px;padding-bottom:20px}
  .hbc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .hb{width:100%;background:var(--green);border-radius:2px 2px 0 0;opacity:.7}
  .hbl{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:3px}
  .tracker-setup{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:20px;margin-bottom:20px}
  .tracker-setup-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:12px}
  .team-selector-wrap{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
  .team-chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
  .team-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:5px;background:var(--bg3);border:1px solid var(--border2);font-size:12px;cursor:default}
  .team-chip.active{background:rgba(0,230,100,.12);border-color:var(--green);color:var(--green)}
  .chip-remove{cursor:pointer;font-size:14px;color:var(--text3);line-height:1}
  .chip-remove:hover{color:var(--loss)}
  .team-add-wrap{display:flex;gap:6px}
  .team-add-in{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 10px;border-radius:5px;width:110px;outline:none}
  .team-add-in:focus{border-color:var(--green)}
  .add-btn{background:var(--green);color:#030803;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:.08em;padding:6px 14px;border-radius:5px;cursor:pointer;text-transform:uppercase}
  .add-btn:hover{background:var(--green2)}
  .tpc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px}
  .tpc.featured{border-color:var(--green);box-shadow:0 0 20px rgba(0,230,100,.08)}
  .tpc.dragging{opacity:.35;transform:scale(.97);transition:transform .15s}
  .tpc.drag-over{outline:2px dashed var(--green);outline-offset:3px}
  .drag-handle{cursor:grab;color:var(--text3);font-size:16px;line-height:1;user-select:none;flex-shrink:0;padding-right:4px;opacity:.5}
  .drag-handle:hover{opacity:1;color:var(--green)}
  .drag-handle:active{cursor:grabbing}
  .tpn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:44px;color:var(--green);line-height:1}
  .tpname{font-size:15px;font-weight:500;margin-top:4px}
  .tpmeta{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px}
  .tprec{font-size:13px;color:var(--text2);margin-top:8px}
  .tp-ph{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .tp-phr{display:flex;align-items:center;gap:10px}
  .tp-phl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);width:76px;flex-shrink:0}
  .tp-phv{font-family:'JetBrains Mono',monospace;font-size:12px;width:42px;text-align:right;flex-shrink:0}
  .mhl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin:12px 0 7px}
  .mhd{display:flex;flex-wrap:wrap;gap:3px}
  .mhdot{width:23px;height:23px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:default}
  .mw{background:rgba(0,230,100,.15);color:var(--green)}
  .ml{background:rgba(255,61,90,.12);color:var(--loss)}
  .mt{background:var(--bg3);color:var(--text3)}
  .no-data-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;text-align:center;color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace}
  .agrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .acard{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:12px}
  .anum{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
  .ateam{font-size:13px;padding:3px 0;display:flex;align-items:center;gap:5px}
  .ateam.hl{color:var(--green);font-weight:600}
  .acap{font-size:10px;font-weight:700;color:var(--green)}
  .sr{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .si,.ss{background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 12px;border-radius:5px;outline:none;transition:border-color .2s}
  .si:focus,.ss:focus{border-color:var(--green)}
  .si{width:200px}
  .pending-banner{background:rgba(0,230,100,.04);border:1px dashed rgba(0,230,100,.2);border-radius:8px;padding:16px 20px;color:var(--text3);font-size:12px;font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:16px}
  .pending-banner strong{color:var(--text2)}
  .splash{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
  .splash-logo svg{width:64px;height:64px}
  .splash-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:.08em;text-transform:uppercase;color:var(--green)}
  .splash-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)}
  .splash-bar{width:220px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
  .splash-fill{height:100%;background:var(--green);border-radius:2px;animation:load 1.8s ease-in-out forwards}
  @keyframes load{from{width:0}to{width:100%}}
  .empty{text-align:center;padding:52px 20px;color:var(--text3)}
  .empty-icon{font-size:34px;margin-bottom:12px;opacity:.35}
  .empty-t{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
  .empty-s{font-size:12px;margin-top:5px;font-family:'JetBrains Mono',monospace}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:var(--bg2)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  @media(max-width:900px){
    .g2,.g3,.g4{grid-template-columns:1fr}
    .agrid{grid-template-columns:1fr 1fr}
    .header-sub,.hdiv{display:none}
    /* Hide desktop pill group entirely — pills shown in mobile row instead */
    .ev-pills{display:none}
    /* Show mobile pills row */
    .pills-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;width:100%;padding-top:6px;border-top:1px solid var(--border)}
  }
  @media(max-width:600px){
    /* Use short nav labels */
    .nav-tab{font-size:0}
    .nav-tab::after{content:attr(data-short);font-size:10px;letter-spacing:.06em}
    /* Header compression */
    .header{height:52px;padding:0 12px;gap:10px}
    .logo-img{width:32px;height:32px}
    .header-logo{font-size:16px}
    .header-logo small{display:none}
    .data-info{display:none}
    /* Status bar */
    .status-bar{padding:6px 12px;font-size:10px}
    /* Nav */
    .nav{padding:0 8px}
    .nav-tab{padding:11px 9px 9px}
    /* Main content */
    .main{padding:14px 12px}
    /* Cards */
    .card{padding:14px}
    .tpc{padding:14px}
    /* Team number */
    .tpn{font-size:36px}
    .tpname{font-size:13px}
    /* Metric cards */
    .mval{font-size:28px}
    /* Search inputs */
    .si{width:100%;min-width:0}
    .sr{gap:6px}
    /* Table padding */
    tbody td{padding:6px 8px}
    thead th{padding:6px 8px}
    /* Tracker setup */
    .tracker-setup{padding:14px}
    .pending-banner{padding:12px 14px}
    /* Bigger touch targets for match row expand */
    tbody tr{min-height:44px}
    /* Guide button - show ? only */
    .guide-btn-text{display:none}
    .guide-btn-icon{display:inline}
    /* Admin refresh buttons - smaller */
    .refresh-btn{font-size:10px;padding:5px 9px}
    /* Sticky offsets for compressed header (52px) + taller status bar (~58px) */
    .status-bar{top:52px}
    .nav{top:110px}
  }
  @media(max-width:400px){
    .nav-tab{padding:11px 7px 9px}
    .header-logo{font-size:14px}
    .tpn{font-size:30px}
  }
</style>
</head>

}

// ── HOUSTON MODE ──
async function loadHoustonData(){
  setS('loading','Loading Houston Championship data…');
  try{
    const res=await fetch('./houston.json?v='+Date.now());
    if(!res.ok) throw new Error('houston.json not found — run Houston Init first');
    setS('loading','Parsing Houston data…');
    const data=await res.json();
    HDB.teams=data.teams||[];
    HDB.teamEventKeys=data.teamEventKeys||{};
    HDB.events=data.events||{};
    HDB.epa=data.epa||{};
    HDB.ace=data.ace||{};
    HDB.sbRanks=data.sbRanks||{};
    HDB.divisionEvent=data.divisionEvent||{};
    HDB.matchPreds=data.matchPreds||{};
    HDB.division=data.division||'Division TBD';
    HDB.divisionEventKey=data.divisionEventKey||'';
    // Build hallM — deduplicated match list across all unique events
    // houston.json stores matches ONCE per event (not per team), so iterate events directly
    setS('loading','Building match index…');
    hallM=[];
    const seen=new Set();
    for(const [evKey,ev] of Object.entries(HDB.events)){
      const evMatches=ev.matches||[];
      for(const m of evMatches){
        if(!seen.has(m.key)){
          seen.add(m.key);
          m._hev=evKey;
          m._hevName=ev.eventName||evKey;
          m._hweek=ev.week||0;
          hallM.push(m);
        }
      }
    }
    // Add division event matches
    const divMatches=HDB.divisionEvent.matches||[];
    for(const m of divMatches){
      if(!seen.has(m.key)){
        seen.add(m.key);
        m._hev=HDB.divisionEventKey;
        m._hevName=HDB.division;
        m._hweek=99;
        hallM.push(m);
      }
    }
    // Populate ACE_DATA from HDB.ace
    ACE_DATA={};
    for(const [num,ace] of Object.entries(HDB.ace)){
      ACE_DATA[parseInt(num)]=ace;
    }
    setS('ok',`Houston data loaded — ${HDB.teams.length} teams · ${hallM.length} matches`);
    setTimeout(()=>setS('ok',''),3000);
    return true;
  }catch(err){
    setS('error','Houston data error: '+err.message);
    console.error('loadHoustonData error:',err);
    return false;
  }
}

// ── LOAD FROM data.json ──
async function init(){
  setS('loading','Loading match data…');
  try{
    const res=await fetch('./data.json?v='+Date.now());
    if(!res.ok) throw new Error('data.json not found');
    const data=await res.json();

    // Hydrate DB from the JSON structure
    EVENTS.forEach(ev=>{
      const evData=data.events?.[ev.key]||{};
      const matches=evData.matches||[];
      DB.matches[ev.key]=matches;
      DB.rankings[ev.key]=evData.rankings||{};
      DB.alliances[ev.key]=evData.alliances||[];
      DB.webcasts[ev.key]=evData.webcasts||[];
      DB.oprs[ev.key]=evData.oprs||{};
      matches.forEach(m=>{
        m._ev=ev.key;m._esh=ev.short;m._en=ev.name;m._ec=ev.cls;m._wk=ev.week;
      });
      allM.push(...matches);
      if(matches.length>0){
        loadedEvents.add(ev.key);
        document.getElementById('pill-'+ev.key).classList.add('loaded');
        const pm=document.getElementById('pill-m-'+ev.key);
        if(pm) pm.classList.add('loaded');
        makePillClickable(ev.key);
      } else {
        document.getElementById('pill-'+ev.key).classList.add('pending');
      }
    });

    distRank=data.districtRankings||[];
    DB.teams=data.teams||{};
    DB.epa=data.epa||{};
    DB.ace=data.ace||{};
    DB.matchPreds=data.matchPreds||{};
    loadACEFromDB();

    // Try to load 1002 avatar if stored in data
    const avatar1002=data.teams?.frc1002;
    if(data.avatar1002){
      const img=document.getElementById('logoImg');
      img.src='data:image/png;base64,'+data.avatar1002;
      img.style.display='block';
      document.getElementById('logoSvg').style.display='none';
    }

    // Update data info line
    const fetchedAt=data.fetchedAt?new Date(data.fetchedAt):null;
    const ago=fetchedAt?timeSince(fetchedAt):'unknown';
    document.getElementById('dataInfo').innerHTML=
      `Data refreshed ${ago}<br><span style="opacity:.6">Use Refresh Now button to update</span>`;

    // Clear any stream URL overrides that predate the current data.json —
    // ensures all users see fresh TBA webcasts after a full refresh, not stale saved URLs
    if(fetchedAt){
      EVENTS.forEach(ev=>{
        const ovKey=`cr_stream_${ev.key}`;
        try{
          const stored=JSON.parse(sessionStorage.getItem(ovKey)||'{}');
          if(stored._savedAt && stored._savedAt < fetchedAt.getTime()){
            sessionStorage.removeItem(ovKey);
          }
        }catch(e){}
      });
    }

    const loadedCount=loadedEvents.size;
    const pending=EVENTS.length-loadedCount;
    setS('ok',`${allM.length} matches · ${loadedCount} events loaded · ${pending>0?pending+' pending':'all complete'}`);

    // Only restore state if this load was triggered by a refresh button (has ?r= param)
    const wasRefresh = new URLSearchParams(window.location.search).has('r');
    if(wasRefresh){
      restoreState();
      // Restore active filter pill UI (desktop + mobile)
      ACTIVE_FILTER.forEach(evKey=>{
        ['pill-'+evKey,'pill-m-'+evKey].forEach(id=>{
          const p=document.getElementById(id);
          if(p) p.classList.add('on');
        });
      });
      if(ACTIVE_FILTER.size) document.getElementById('filterHint').style.display='inline';
      // Restore match type pill UI (desktop + mobile)
      ['qm','po','all'].forEach(v=>{
        ['mtype-pill-'+v,'mtype-pill-'+v+'-m'].forEach(id=>{
          const el=document.getElementById(id);
          if(el) el.className='mtype-pill'+(MATCH_TYPE===v?' on':'');
        });
      });
    } else {
      // Clean slate — clear any saved state from previous sessions
      sessionStorage.removeItem('cr_tracked');
      sessionStorage.removeItem('cr_filter');
      sessionStorage.removeItem('cr_matchType');
      sessionStorage.removeItem('cr_scType');
      sessionStorage.removeItem('cr_ovType');
      sessionStorage.removeItem('cr_cardType');
      sessionStorage.removeItem('cr_cardMode');
      sessionStorage.removeItem('cr_activePage');
    }

    renderAll();

    // Restore active tab (only if refresh)
    if(wasRefresh){
      const savedPage=sessionStorage.getItem('cr_activePage');
      if(savedPage){
        const tabs=document.querySelectorAll('.nav-tab');
        tabs.forEach(tab=>{ if(tab.getAttribute('onclick')&&tab.getAttribute('onclick').includes("'"+savedPage+"'")) showPage(savedPage,tab); });
      }
    }

    // Auto-fetch ACE on init removed — ACE now loads from data.json via loadACEFromDB()

    // ── Houston Mode auto-activation (default) ──
    const urlParams=new URLSearchParams(window.location.search);
    const pchParam=urlParams.get('pch')==='1';
    const pchSession=sessionStorage.getItem('cr_houston')==='0';
    if(!pchParam&&!pchSession){
      const ok=await loadHoustonData();
      if(ok){
        HOUSTON_MODE=true;
        sessionStorage.setItem('cr_houston','1');
        applyHoustonMode();
        renderAll();
        // Default to Overview tab in Houston mode
        const ovTab=document.querySelector('.nav-tab[onclick*="\'overview\'"]');
        if(ovTab) showPage('overview',ovTab);
      }
    }
  }catch(err){
    setS('error','Failed to load data.json — '+err.message);
    document.getElementById('dataInfo').textContent='No data loaded';
  }
  // Hide splash
  document.getElementById('splash').style.display='none';
}

function timeSince(date){
  const s=Math.floor((Date.now()-date)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function phS(m,a,ph){
  const bd=m.score_breakdown?.[a];if(!bd)return null;
  if(ph==='auto')    return bd.totalAutoPoints    ??bd.autoPoints    ??bd.auto_points    ??null;
  if(ph==='teleop')  return bd.totalTeleopPoints  ??bd.teleopPoints  ??bd.teleop_points  ??null;
  if(ph==='endgame') return bd.endGameTowerPoints ??bd.endgamePoints ??bd.endgame_points ??bd.endGamePoints??null;
  return null;
}
// Houston phase score — reads from hubScore nested object
function hPhS(m,a,ph){
  const bd=m.score_breakdown?.[a];if(!bd)return null;
  const hs=bd.hubScore;
  if(hs){
    if(ph==='auto')    return hs.autoPoints    ??null;
    if(ph==='teleop')  return hs.teleopPoints  ??null;
    if(ph==='endgame') return hs.endgamePoints ??null;
  }
  // Fallback to top-level fields
  if(ph==='auto')    return bd.autoPoints    ??bd.auto_points    ??null;
  if(ph==='teleop')  return bd.teleopPoints  ??bd.teleop_points  ??null;
  if(ph==='endgame') return bd.endgamePoints ??bd.endgame_points ??null;
  return null;
}

// Extract hubScore fields from a breakdown alliance
function hubS(m,a){
  const bd=m.score_breakdown?.[a];
  const hs=bd?.hubScore;
  if(!hs) return null;
  return {
    auto:       hs.autoPoints      ??0,
    teleop:     hs.teleopPoints    ??0,
    endgame:    hs.endgamePoints   ??0,
    transition: hs.transitionPoints??0,
    s1:         hs.shift1Points    ??0,
    s2:         hs.shift2Points    ??0,
    s3:         hs.shift3Points    ??0,
    s4:         hs.shift4Points    ??0,
    total:      hs.totalPoints     ??0,
  };
}
// Houston mode: simple breakdown from standard TBA score_breakdown fields
function hBreakdownS(m, a) {
  const bd = m.score_breakdown?.[a];
  if (!bd) return null;
  const auto    = bd.autoPoints    ?? bd.auto_points    ?? null;
  const teleop  = bd.teleopPoints  ?? bd.teleop_points  ?? null;
  const endgame = bd.endgamePoints ?? bd.endgame_points ?? bd.endGameBargePoints ?? null;
  const total   = bd.totalPoints   ?? bd.total_points   ?? null;
  const fouls   = bd.foulPoints    ?? bd.foul_points    ?? null;
  // Only return if we have at least total
  if (total === null) return null;
  return { auto, teleop, endgame, total, fouls };
}

// Average hubScore breakdown for a team across their matches
function teamHubAvg(tk, matches){
  const acc={auto:0,teleop:0,endgame:0,transition:0,s1:0,s2:0,s3:0,s4:0,total:0};
  let n=0;
  matches.forEach(m=>{
    const red=m.alliances?.red?.team_keys||[];
    const blue=m.alliances?.blue?.team_keys||[];
    const side=red.includes(tk)?'red':blue.includes(tk)?'blue':null;
    if(!side) return;
    const hs=hubS(m,side);
    if(!hs||hs.total===0) return;
    Object.keys(acc).forEach(k=>acc[k]+=hs[k]);
    n++;
  });
  if(!n) return null;
  const avg={};
  Object.keys(acc).forEach(k=>avg[k]=acc[k]/n);
  avg.n=n;
  return avg;
}
function evAvgPh(ek,ph){const v=[];qm(ek).forEach(m=>['red','blue'].forEach(a=>{const x=phS(m,a,ph);if(x!==null)v.push(x);}));return v.length?v.reduce((s,x)=>s+x,0)/v.length:null;}
function evAvgScore(ek){let s=0,c=0;qm(ek).forEach(m=>{if((m.alliances?.red?.score??-1)>=0){s+=m.alliances.red.score;c++;}if((m.alliances?.blue?.score??-1)>=0){s+=m.alliances.blue.score;c++;}});return c?s/c:0;}
function evMax(ek){let mx=0;qm(ek).forEach(m=>{if((m.alliances?.red?.score||0)>mx)mx=m.alliances.red.score;if((m.alliances?.blue?.score||0)>mx)mx=m.alliances.blue.score;});return mx;}
function teamStats(tk){
  const s={wins:0,losses:0,ties:0,tot:0,aT:0,tlT:0,egT:0,matches:[]};
  allM.filter(m=>m.comp_level==='qm').forEach(m=>{
    const red=m.alliances?.red?.team_keys||[],blue=m.alliances?.blue?.team_keys||[];
    let al=null;if(red.includes(tk))al='red';else if(blue.includes(tk))al='blue';if(!al)return;
    const opp=al==='red'?'blue':'red';
    const my=m.alliances?.[al]?.score??0,op=m.alliances?.[opp]?.score??0;
    const w=m.winning_alliance;let res='tie';if(w===al)res='win';else if(w===opp)res='loss';
    if(res==='win')s.wins++;else if(res==='loss')s.losses++;else s.ties++;s.tot+=my;
    const au=phS(m,al,'auto'),tl=phS(m,al,'teleop'),eg=phS(m,al,'endgame');
    if(au!==null)s.aT+=au;if(tl!==null)s.tlT+=tl;if(eg!==null)s.egT+=eg;
    s.matches.push({m,al,res,my,op,au,tl,eg});
  });
  const n=s.wins+s.losses+s.ties||1;
  s.avgS=s.tot/n;s.avgA=s.aT/n;s.avgTl=s.tlT/n;s.avgEg=s.egT/n;s.n=n;return s;
}

function editStream(evKey, slot){
  const editDiv=document.getElementById(`stream-edit-${slot}`);
  const input=document.getElementById(`stream-input-${slot}`);
  if(!editDiv||!input) return;
  // Pre-fill with current frame src
  const frame=document.getElementById(`stream-frame-${slot}`);
  if(frame) input.value=frame.src.replace('?autoplay=0','').replace('https://www.youtube.com/embed/','https://www.youtube.com/watch?v=');
  editDiv.style.display='block';
  input.focus();
  input.select();
}
function saveStream(evKey, slot){
  const input=document.getElementById(`stream-input-${slot}`);
  if(!input) return;
  const raw=input.value.trim();
  if(!raw) return;
  // Extract video ID from various YouTube URL formats
  let embedUrl;
  const m=raw.match(/(?:v=|youtu\.be\/|embed\/)([^&?/\s]+)/);
  if(m) embedUrl=`https://www.youtube.com/embed/${m[1]}?autoplay=0`;
  else if(raw.startsWith('UC')) embedUrl=`https://www.youtube.com/embed/live_stream?channel=${raw}&autoplay=0`;
  else if(/^[a-zA-Z0-9_-]{11}$/.test(raw)) embedUrl=`https://www.youtube.com/embed/${raw}?autoplay=0`;
  else embedUrl=raw; // use as-is
  // Save to sessionStorage
  const ovKey=`cr_stream_${evKey}`;
  let overrides={};
  try{ overrides=JSON.parse(sessionStorage.getItem(ovKey)||'{}'); }catch(e){}
  overrides[slot]=embedUrl;
  overrides._savedAt=Date.now();
  sessionStorage.setItem(ovKey, JSON.stringify(overrides));
  // Update iframe immediately
  const frame=document.getElementById(`stream-frame-${slot}`);
  if(frame) frame.src=embedUrl;
  // Hide edit panel
  document.getElementById(`stream-edit-${slot}`).style.display='none';
}
function toggleStream(url1, url2){
  const frame=document.getElementById('streamFrame');
  const btn=document.getElementById('streamToggleBtn');
  if(!frame) return;
  const current=frame.src;
  const next=current.includes(url1.split('?')[0])?url2:url1;
  frame.src=next;
  const isOverhead=next===url1;
  if(btn) btn.textContent=isOverhead?'Switch Stream':'Switch to Overhead';
}

// matchType: 'qm' | 'po' | 'all'
function teamStatsF(tk,fM,matchType='qm'){
  const s={wins:0,losses:0,ties:0,tot:0,aT:0,tlT:0,egT:0,matches:[]};
  const filtered = matchType==='qm' ? fM.filter(m=>m.comp_level==='qm')
                 : matchType==='po' ? fM.filter(m=>m.comp_level!=='qm')
                 : fM;
  // Use hPhS in Houston mode (reads from hubScore), phS otherwise
  const getPhase=(m,al,ph)=>HOUSTON_MODE?hPhS(m,al,ph):phS(m,al,ph);
  filtered.forEach(m=>{
    const red=m.alliances?.red?.team_keys||[],blue=m.alliances?.blue?.team_keys||[];
    let al=null;if(red.includes(tk))al='red';else if(blue.includes(tk))al='blue';if(!al)return;
    const opp=al==='red'?'blue':'red';
    const my=m.alliances?.[al]?.score??0,op=m.alliances?.[opp]?.score??0;
    const w=m.winning_alliance;let res='tie';if(w===al)res='win';else if(w===opp)res='loss';
    if(res==='win')s.wins++;else if(res==='loss')s.losses++;else s.ties++;s.tot+=my;
    const au=getPhase(m,al,'auto'),tl=getPhase(m,al,'teleop'),eg=getPhase(m,al,'endgame');
    if(au!==null)s.aT+=au;if(tl!==null)s.tlT+=tl;if(eg!==null)s.egT+=eg;
    s.matches.push({m,al,res,my,op,au,tl,eg});
  });
  // Sort: event week (_wk for PCH, _hweek for Houston) → match type → set → match number
  const poOrder={qm:0,qf:1,sf:2,f:3};
  s.matches.sort((a,b)=>{
    const wkA=a.m._wk||a.m._hweek||0, wkB=b.m._wk||b.m._hweek||0;
    if(wkA!==wkB) return wkA-wkB;
    const cl=(poOrder[a.m.comp_level]||0)-(poOrder[b.m.comp_level]||0); if(cl!==0)return cl;
    const sn=(a.m.set_number||0)-(b.m.set_number||0); if(sn!==0)return sn;
    return a.m.match_number-b.m.match_number;
  });
  const n=s.wins+s.losses+s.ties||1;s.avgS=s.tot/n;s.avgA=s.aT/n;s.avgTl=s.tlT/n;s.avgEg=s.egT/n;s.n=n;return s;
}

}

let SC_TYPE = 'qm'; // kept for compatibility, mirrors MATCH_TYPE
let MATCH_TYPE = 'qm'; // global match type filter: 'qm' | 'po' | 'all'

function setMatchType(t){
  MATCH_TYPE=t; SC_TYPE=t;

  ['qm','po','all'].forEach(v=>{

      const el=document.getElementById(id);
      if(el) el.className='mtype-pill'+(t===v?' on':'');
    });
  });
  // Re-render affected tabs
  if(HOUSTON_MODE){ renderHSc(); renderTm(); renderHMx(); }
  else { renderOv(); renderSc(); renderTm(); renderMx(); }
}
function renderSc(){
  const fM=filteredMatches();
  const ms = MATCH_TYPE==='qm' ? fM.filter(m=>m.comp_level==='qm')
           : MATCH_TYPE==='po' ? fM.filter(m=>m.comp_level!=='qm')
           : fM;
  const scLabel = MATCH_TYPE==='qm'?'Qualification':MATCH_TYPE==='po'?'Playoff':'All';
  const margins=ms.filter(m=>m.winning_alliance).map(m=>Math.abs((m.alliances?.red?.score||0)-(m.alliances?.blue?.score||0)));
  const avgMar=margins.length?margins.reduce((a,b)=>a+b,0)/margins.length:0;
  const close=margins.filter(m=>m<=10).length,blow=margins.filter(m=>m>40).length;
  const topRows=[];
  ms.forEach(m=>['red','blue'].forEach(a=>{const sc=m.alliances?.[a]?.score??0;if(sc<0)return;topRows.push({sc,teams:(m.alliances?.[a]?.team_keys||[]).map(tnum),a,mn:m.match_number,esh:m._esh,ec:m._ec,au:phS(m,a,'auto'),tl:phS(m,a,'teleop'),eg:phS(m,a,'endgame'),won:m.winning_alliance===a,isQm:m.comp_level==='qm',m});}));
  topRows.sort((a,b)=>b.sc-a.sc);
  const btnStyle=(active)=>active?`background:var(--green);color:#030803;border:1px solid var(--green);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:.08em;padding:5px 14px;border-radius:4px;cursor:pointer;text-transform:uppercase`:`background:transparent;color:var(--text3);border:1px solid var(--border2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;padding:5px 14px;border-radius:4px;cursor:pointer;text-transform:uppercase`;
  const evMs=ek=>ms.filter(m=>m._ev===ek);
  const evAvgSc=ek=>{const v=evMs(ek);let s=0,c=0;v.forEach(m=>{if((m.alliances?.red?.score??-1)>=0){s+=m.alliances.red.score;c++;}if((m.alliances?.blue?.score??-1)>=0){s+=m.alliances.blue.score;c++;}});return c?s/c:0;};
  const evMxSc=ek=>{let mx=0;evMs(ek).forEach(m=>{if((m.alliances?.red?.score||0)>mx)mx=m.alliances.red.score;if((m.alliances?.blue?.score||0)>mx)mx=m.alliances.blue.score;});return mx;};
  const evAvgPhSc=(ek,ph)=>{const v=[];evMs(ek).forEach(m=>['red','blue'].forEach(a=>{const x=phS(m,a,ph);if(x!==null)v.push(x);}));return v.length?v.reduce((s,x)=>s+x,0)/v.length:null;};

  // Avg hub phase per event
  function evAvgHub(ek){
    const acc={auto:0,transition:0,s1:0,s2:0,s3:0,s4:0,endgame:0,teleop:0};
    let n=0;
    evMs(ek).forEach(m=>{
      ['red','blue'].forEach(a=>{
        const hs=hubS(m,a);
        if(!hs||hs.total===0) return;
        Object.keys(acc).forEach(k=>acc[k]+=hs[k]||0);
        n++;
      });
    });
    if(!n) return null;
    const avg={};Object.keys(acc).forEach(k=>avg[k]=acc[k]/n);avg.n=n;
    return avg;
  }

  // Build shift breakdown table rows
  const loadedEvKeys=EVENTS.filter(ev=>loadedEvents.has(ev.key)&&(ACTIVE_FILTER.size===0||ACTIVE_FILTER.has(ev.key)));
  const allHubs=loadedEvKeys.map(ev=>evAvgHub(ev.key)).filter(Boolean);
  const phases=[
    {label:'Auto',       k:'auto',         col:'var(--blue)'},
    {label:'Transition', k:'transition',    col:'var(--text2)'},
    {label:'Sh 1/2',     k:'s12',          col:'#a78bfa'},
    {label:'Sh 3/4',     k:'s34',          col:'#a78bfa'},
    {label:'Endgame',    k:'endgame',       col:'var(--orange)'},
    {label:'Teleop',     k:'teleop',        col:'#00c8aa', sub:true},
  ];
  // Compute paired shifts
  const hubsWithPaired=allHubs.map(h=>({...h,s12:(h.s1||0)+(h.s2||0),s34:(h.s3||0)+(h.s4||0)}));
  const maxPerPhase={};
  phases.forEach(p=>{maxPerPhase[p.k]=Math.max(...hubsWithPaired.map(h=>h[p.k]||0),1);});

  // Build top-20 breakdown panels (same as match log)
  function topRowPanel(row,idx){
    const m=row.m;
    const rhs=hubS(m,'red'),bhs=hubS(m,'blue');
    if(!rhs&&!bhs) return '';
    const rWin=m.winning_alliance==='red',bWin=m.winning_alliance==='blue';
    const bdPhases=[
      {label:'Auto',       k:'auto',    col:'var(--blue)'},
      {label:'Transition', k:'transition',col:'var(--text2)'},
      {label:'Sh 1 / 2',  k1:'s1',k2:'s2', col:'#a78bfa'},
      {label:'Sh 3 / 4',  k1:'s3',k2:'s4', col:'#a78bfa'},
      {label:'Endgame',   k:'endgame', col:'var(--orange)'},
      {label:'Teleop',    k:'teleop',  col:'#00c8aa',sub:true},
      {label:'Total',     k:'total',   col:'var(--green)',total:true},
    ];
    const f=(hs,p)=>p.k1!=null?((hs?hs[p.k1]:0)||0)+((hs?hs[p.k2]:0)||0):(hs?hs[p.k]:0)||0;
    const maxV=Math.max(...bdPhases.map(p=>Math.max(f(rhs,p),f(bhs,p))),1);
    const makeRow=(p)=>{
      const rv=f(rhs,p),bv=f(bhs,p);
      const isTotal=!!p.total,isSub=!!p.sub;
      const pctR=Math.round((rv/maxV)*100),pctB=Math.round((bv/maxV)*100);
      const rCol=rWin&&isTotal?'var(--loss)':rv>bv?'rgba(255,100,100,.9)':'var(--text3)';
      const bCol=bWin&&isTotal?'var(--blue)':bv>rv?'rgba(80,180,255,.9)':'var(--text3)';
      const barR=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctR}%;height:100%;background:var(--loss);opacity:${rWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;right:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${rCol}">${rv}</div></div>`;
      const barB=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctB}%;height:100%;background:var(--blue);opacity:${bWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;left:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;padding-left:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${bCol}">${bv}</div></div>`;
      const topStyle=isTotal?'padding-top:8px;border-top:1px solid var(--border);margin-top:6px':isSub?'padding-top:5px;border-top:1px dashed rgba(255,255,255,.1);margin-top:2px;margin-bottom:4px':'margin-bottom:4px';
      return`<div style="display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;gap:8px;${topStyle}">${barR}<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:${isTotal||isSub?900:700};font-size:${isTotal?'11':'10'}px;letter-spacing:.08em;text-transform:uppercase;color:${isTotal?'var(--text2)':p.col}">${p.label}${isSub?'<div style="font-size:8px;font-weight:400;color:var(--text3);letter-spacing:.04em;margin-top:1px">subtotal</div>':''}</div>${barB}</div>`;
    };
    const bdId=`sc-bd-${idx}`;
    return`<tr id="${bdId}" class="mx-bd">
      <td colspan="11" style="padding:0">
        <div style="padding:14px 24px 16px">
          <div style="display:grid;grid-template-columns:1fr 90px 1fr;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
            <div style="text-align:right;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${rWin?'var(--loss)':'var(--text3)'}">RED ALLIANCE</div>
            <div></div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${bWin?'var(--blue)':'var(--text3)'}">BLUE ALLIANCE</div>
          </div>
          ${bdPhases.map(makeRow).join('')}
          <div style="margin-top:10px;text-align:right;font-size:9px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase">Alliance totals · click row to close</div>
        </div>
      </td>
    </tr>`;
  }

  document.getElementById('pg-scoring').innerHTML=`
<div class="sh"><h2>Scoring <span>Analysis</span></h2><span class="sub">${scLabel} matches${filterLabel()}</span></div>
${ACTIVE_FILTER.size?`<div class="pending-banner" style="background:rgba(0,230,100,.06);border-color:rgba(0,230,100,.3);margin-bottom:16px">🔍 Filtered to: ${EVENTS.filter(ev=>ACTIVE_FILTER.has(ev.key)).map(e=>`<span class="badge ${e.cls}">${e.short}</span>`).join(' ')}</div>`:''}
<div class="g3" style="margin-bottom:16px">
  <div class="metric"><div class="mlabel">Avg Margin of Victory</div><div class="mval" style="color:var(--loss)">${avgMar.toFixed(1)}</div><div class="msub">points</div></div>
  <div class="metric"><div class="mlabel">Close Matches (≤10 pts)</div><div class="mval" style="color:var(--win)">${close}</div><div class="msub">of ${margins.length} decided</div></div>
  <div class="metric"><div class="mlabel">Blowouts (>40 pts)</div><div class="mval" style="color:var(--orange)">${blow}</div><div class="msub">of ${margins.length} decided</div></div>
</div>
<div class="g2" style="margin-bottom:16px">
  <div class="card"><div class="ctitle">Phase Breakdown by Event — ${scLabel}</div>
    <table><thead><tr>
      ${thSort('sc','ev','Event','')}
      ${thSort('sc','auto','Auto','r')}
      ${thSort('sc','tl','Teleop','r')}

    <tbody>${(()=>{

      if(sc&&sc!=='ev'){
        const sortable=scRows.filter(r=>!r.skip);
        const rest=scRows.filter(r=>r.skip);
        sortable.sort((a,b)=>((a[sc]??-1)-(b[sc]??-1))*sd);

function addTrackedTeam(){
  const inp=document.getElementById('trackAdd');
  const n=parseInt(inp.value.trim());
  if(!n||isNaN(n)){inp.value='';return;}
  const maxT=HOUSTON_MODE?MAX_TRACKED_HOUSTON:MAX_TRACKED;
  if(TRACKED.length>=maxT){
    setS('error',`Maximum ${maxT} teams can be tracked at once.`);
    setTimeout(()=>setS('ok',''),3000);

}

// Get OPR/DPR/CCWM for a team across all loaded events
function getTeamOPRs(tk){
  if(HOUSTON_MODE){
    // In Houston mode, read OPRs from HDB.events
    const results=[];
    const teamNum=parseInt(tk.replace('frc',''));
    const evKeys=HDB.teamEventKeys[teamNum]||[];
    evKeys.forEach(evKey=>{
      const ev=HDB.events[evKey]||{};
      const oprs=ev.oprs||{};
      const opr=oprs.oprs?.[tk]??null;
      const dpr=oprs.dprs?.[tk]??null;
      const ccwm=oprs.ccwms?.[tk]??null;
      if(opr!==null||dpr!==null||ccwm!==null){
        const evName=(ev.eventName||evKey).replace('2026','').toUpperCase();
        results.push({ev:{key:evKey,short:evName,name:ev.eventName||evKey},opr,dpr,ccwm});
      }
    });
    return results;
  }
  const results=[];
  EVENTS.forEach(ev=>{
    if(!loadedEvents.has(ev.key)) return;
    const oprs=DB.oprs[ev.key]||{};
    const opr=oprs.oprs?.[tk]??null;
    const dpr=oprs.dprs?.[tk]??null;
    const ccwm=oprs.ccwms?.[tk]??null;
    if(opr!==null||dpr!==null||ccwm!==null){
      results.push({ev,opr,dpr,ccwm});
    }
  });
  return results;
}

// Overview phase table match type
let OV_TYPE = 'qm';

function calcPhaseStats(matches, mode) {
  let ms = [...matches];
  if (ms.length === 0) return { avgS:0, avgA:0, avgTl:0, avgEg:0, n:0 };
  if (mode === 'last10') {
    ms = ms.slice(-10);
  } else if (mode === 'trimmed') {
    if (ms.length > 4) {
      const sorted = [...ms].sort((a, b) => a.my - b.my);
      ms = sorted.slice(2, sorted.length - 2);
    }
  }
  const n = ms.length || 1;
  const avgS  = ms.reduce((s,m) => s + m.my, 0) / n;
  const auVals = ms.map(m => m.au).filter(v => v !== null);
  const tlVals = ms.map(m => m.tl).filter(v => v !== null);
  const egVals = ms.map(m => m.eg).filter(v => v !== null);
  const avgA  = auVals.length ? auVals.reduce((s,v) => s+v, 0) / auVals.length : 0;
  const avgTl = tlVals.length ? tlVals.reduce((s,v) => s+v, 0) / tlVals.length : 0;
  const avgEg = egVals.length ? egVals.reduce((s,v) => s+v, 0) / egVals.length : 0;
  return { avgS, avgA, avgTl, avgEg, n: ms.length };
}

function renderTmTable(teams){
  const {col,dir}=SORT.tm;
  const allTotals=allLatestEPAs();
  const sorted=[...teams].sort((a,b)=>{
    if(!col){
      if(HOUSTON_MODE){
        const aGl=HDB.sbRanks?.[a.num]?.rank_global??99999;
        const bGl=HDB.sbRanks?.[b.num]?.rank_global??99999;
        return aGl-bGl;
      }
      return a.rank-b.rank;
    }
    const epaA=getLatestEPA(a.key),epaB=getLatestEPA(b.key);
    const aceA=ACE_DATA[a.num],aceB=ACE_DATA[b.num];
    let av,bv;
    if(col==='rank')    {av=a.rank??999;bv=b.rank??999;}
    else if(col==='w')  {av=a.stats.wins;bv=b.stats.wins;}
    else if(col==='l')  {av=a.stats.losses;bv=b.stats.losses;}
    else if(col==='t')  {av=a.stats.ties;bv=b.stats.ties;}
    else if(col==='avg'){av=a.stats.avgS;bv=b.stats.avgS;}
    else if(col==='auto'){av=a.stats.avgA;bv=b.stats.avgA;}
    else if(col==='tl') {av=a.stats.avgTl;bv=b.stats.avgTl;}
    else if(col==='eg') {av=a.stats.avgEg;bv=b.stats.avgEg;}
    else if(col==='epa'){av=epaA?.total??-1;bv=epaB?.total??-1;}
    else if(col==='epa_auto'){av=epaA?.auto??-1;bv=epaB?.auto??-1;}
    else if(col==='epa_eg'){av=epaA?.endgame??-1;bv=epaB?.endgame??-1;}
    else if(col==='ace'){av=aceA?.ace??-1;bv=aceB?.ace??-1;}
    else if(col==='ga') {av=aceA?.rank_state??999;bv=aceB?.rank_state??999;}
    return (av-bv)*dir;
  });
  const th=(c,l,cls,sty)=>`<th class="${cls||''}" style="cursor:pointer;user-select:none${sty?';'+sty:''}" onclick="setSort('tm','${c}')">${l}</th>`;
  const rankLabel=HOUSTON_MODE?'Global':'Rank';
  const lastCol=HOUSTON_MODE?th('ga','US Rank','r','color:#b464ff'):th('ga','GA','r','color:#b464ff');
  return`<table><thead><tr>
    ${th('rank',rankLabel,'')}${th('team','Team','')}
    ${th('w','W','r')}${th('l','L','r')}${th('t','T','r')}
    ${th('avg','Avg Score','r')}${th('auto','Avg Auto','r','color:var(--blue)')}
    ${th('tl','Avg Teleop','r')}${th('eg','Avg Endgame','r','color:var(--orange)')}
    ${th('epa','EPA','r','color:var(--green)')}
    ${th('epa_auto','EPA Auto','r','color:var(--blue)')}
    ${th('epa_eg','EPA EG','r','color:var(--orange)')}
    ${th('ace','ACE','r','color:var(--green)')}
    ${lastCol}
    <th></th>
  </tr></thead>
  <tbody>${sorted.map(t=>{
    const epa=HOUSTON_MODE?hGetLatestEPA(t.key):getLatestEPA(t.key);
    const tc=teamColorByKey(t.key);
    const ace=HOUSTON_MODE?(HDB.ace?.[t.num]||null):ACE_DATA[t.num];
    const aceVal=ace?.ace!=null?ace.ace.toFixed(1):'–';
    // Last column: Houston=US rank, PCH=GA state rank
    let lastVal='–', lastCol='var(--text3)';
    if(HOUSTON_MODE){
      const sbr=HDB.sbRanks?.[t.num];
      const isUS=sbr?.country==='USA';
      lastVal=sbr==null?'–':isUS?(sbr.rank_country!=null?`#${sbr.rank_country}`:'–'):'N/A';
      lastCol=lastVal==='N/A'?'var(--text3)':'#b464ff';
    } else {
      const sr=ace?.rank_state;
      lastVal=sr!=null?`#${sr}`:'–';
      lastCol=sr!=null?(sr<=5?'var(--green)':sr<=15?'#f0c040':'var(--text3)'):'var(--text3)';
    }
    // Rank column: Houston=global rank, PCH=district rank
    const rankVal=HOUSTON_MODE?(HDB.sbRanks?.[t.num]?.rank_global??'–'):(t.rank===999?'–':t.rank);
    const rankTop=HOUSTON_MODE?(typeof rankVal==='number'&&rankVal<=3):(t.rank<=3);
    return`<tr style="${tc?'border-left:3px solid '+tc.border+';':''}" class="${isTr(t.key)?'hl':''}">
    <td><span class="rk ${rankTop?'top':''}">${rankVal}</span></td>
    <td><a class="tlink" href="${HOUSTON_MODE?`https://www.statbotics.io/team/${t.num}`:`https://www.thebluealliance.com/team/${t.num}`}" target="_blank" style="${tc?'color:'+tc.text:''}">${t.name}</a><span class="tnsm">${t.num}</span>${tc?`<span style="margin-left:5px;font-size:11px;color:${tc.text}">★</span>`:''}</td>
    <td class="r" style="color:var(--win)">${t.stats.wins}</td>
    <td class="r" style="color:var(--loss)">${t.stats.losses}</td>
    <td class="r dim">${t.stats.ties}</td>
    <td class="r" style="color:var(--green);font-weight:600">${t.stats.avgS.toFixed(1)}</td>
    <td class="r" style="color:var(--blue)">${t.stats.avgA.toFixed(1)}</td>
    <td class="r">${t.stats.avgTl.toFixed(1)}</td>
    <td class="r" style="color:var(--orange)">${t.stats.avgEg.toFixed(1)}</td>
    <td class="r" style="color:${epaColor(epa?.total??null,allTotals)};font-weight:600">${fmtEPA(epa?.total??null)}</td>
    <td class="r" style="color:var(--blue)">${fmtEPA(epa?.auto??null)}</td>
    <td class="r" style="color:var(--orange)">${fmtEPA(epa?.endgame??null)}</td>
    <td class="r" style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px">${aceVal}</td>
    <td class="r" style="color:${lastCol};font-family:'JetBrains Mono',monospace;font-size:12px">${lastVal}</td>
    <td>${isTr(t.key)
      ? `<button onclick="removeTrackedTeam(${t.num})" style="font-size:10px;padding:2px 7px;background:transparent;border:1px solid var(--loss);color:var(--loss);border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em">− Remove</button>`
      : HOUSTON_MODE?'':`<button onclick="if(!TRACKED.includes(${t.num}))TRACKED.push(${t.num});renderAll()" style="font-size:10px;padding:2px 7px;background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.06em" ${TRACKED.length>=MAX_TRACKED?'disabled':''}>+ Track</button>`
    }</td>
  </tr>`;}).join('')}</tbody></table>`;}
function renderTm(){
  const fM=HOUSTON_MODE ? hallM : filteredMatches();
  const allTkeys=new Set();
  if(HOUSTON_MODE){
    // In Houston mode, use all 75 registered teams
    (HDB.teams||[]).forEach(t=>allTkeys.add(`frc${t.num}`));
  } else {
    allM.filter(m=>m.comp_level==='qm').forEach(m=>{(m.alliances?.red?.team_keys||[]).forEach(k=>allTkeys.add(k));(m.alliances?.blue?.team_keys||[]).forEach(k=>allTkeys.add(k));});
  }
  const allTm=[...allTkeys].map(k=>{
    const stats=teamStatsF(k,fM);
    const num=parseInt(tnum(k));
    const name=HOUSTON_MODE?((HDB.teams||[]).find(t=>t.num===num)?.name||tn(k)):tn(k);
    const dr=distRank.find(r=>r.team_key===k);
    const hRank=HOUSTON_MODE?(HDB.sbRanks?.[num]?.rank_global??99999):(dr?.rank??999);
    return{key:k,num,name,stats,rank:hRank};
  }).sort((a,b)=>a.rank-b.rank);
  window._allTm=allTm;

  // Compute shared scale maxes across all tracked teams
  const trackedStats=TRACKED.map(n=>{
    const k=`frc${n}`;
    const mode=CARD_MODE[n]||'all';
    const s=teamStatsF(k,fM,MATCH_TYPE);
    const cs=mode==='all'?{avgS:s.avgS,avgA:s.avgA,avgTl:s.avgTl,avgEg:s.avgEg}:calcPhaseStats(s.matches,mode);
    // Shift breakdown matches
    let tMatches=s.matches.filter(mx=>(mx.m.alliances?.red?.score??-1)>=0);
    if(mode==='last10') tMatches=tMatches.slice(-10);
    else if(mode==='trimmed'&&tMatches.length>4){const sorted=[...tMatches].sort((a,b)=>a.my-b.my);tMatches=sorted.slice(2,sorted.length-2);}
    const hub=teamHubAvg(k,tMatches.map(mx=>mx.m));
    return{cs,hub};
  });
  const sharedMax={
    avgS: Math.max(...trackedStats.map(t=>t.cs?.avgS||0),1),
    avgA: Math.max(...trackedStats.map(t=>t.cs?.avgA||0),1),
    avgTl: Math.max(...trackedStats.map(t=>t.cs?.avgTl||0),1),
    avgEg: Math.max(...trackedStats.map(t=>t.cs?.avgEg||0),1),
    // Shift breakdown phases
    auto: Math.max(...trackedStats.map(t=>t.hub?.auto||0),1),
    transition: Math.max(...trackedStats.map(t=>t.hub?.transition||0),1),
    s12: Math.max(...trackedStats.map(t=>((t.hub?.s1||0)+(t.hub?.s2||0))||0),1),
    s34: Math.max(...trackedStats.map(t=>((t.hub?.s3||0)+(t.hub?.s4||0))||0),1),
    endgame: Math.max(...trackedStats.map(t=>t.hub?.endgame||0),1),
    teleop: Math.max(...trackedStats.map(t=>t.hub?.teleop||0),1),
    total: Math.max(...trackedStats.map(t=>t.hub?.total||0),1),
  };

  const trkCards=TRACKED.length===0?`<div class="no-data-card">${HOUSTON_MODE?'No teams tracked yet — use the Team Tracking button in the status bar.':'No teams tracked yet — add team numbers below or click + Track in the table.'}</div>`
    :TRACKED.map(n=>{const k=`frc${n}`;const dr=distRank.find(r=>r.team_key===k);const hName=HOUSTON_MODE?((HDB.teams||[]).find(t=>t.num===n)?.name||tn(k)):tn(k);return renderTPCard({n,k,name:hName,rank:dr?.rank??'–'},sharedMax);}).join('');
  const gridCols=Math.min(TRACKED.length,3)||1;
  document.getElementById('pg-teams').innerHTML=`
<div class="sh"><h2>Team <span>Tracker</span></h2><span class="sub">${allTkeys.size} teams in match data${filterLabel()}</span></div>
${ACTIVE_FILTER.size?`<div class="pending-banner" style="background:rgba(0,230,100,.06);border-color:rgba(0,230,100,.3);margin-bottom:16px">🔍 Stats reflect filtered events: ${EVENTS.filter(ev=>ACTIVE_FILTER.has(ev.key)).map(e=>`<span class="badge ${e.cls}">${e.short}</span>`).join(' ')}</div>`:''}
${renderTrackerSetup()}
<div style="display:grid;grid-template-columns:repeat(${gridCols},1fr);gap:16px;margin-bottom:22px">${trkCards}</div>
<div class="card">
  <div class="ctitle" style="margin-bottom:12px">All Teams — Performance Summary${ACTIVE_FILTER.size?' (filtered)':''}</div>
  <div class="sr">
    <input type="text" class="si" id="tmSearch" placeholder="Search team…" oninput="filterTm()"/>
  </div>
  <div class="tw tw-scroll" id="tmTbl">${renderTmTable(allTm)}</div>
</div>`;
  // Restore section expand states after DOM re-render
  TRACKED.forEach(n=>{
    ['opr','epa','ace','breakdown'].forEach(which=>{
      const expanded=which==='opr'?OPR_EXPANDED:which==='epa'?EPA_EXPANDED:which==='ace'?ACE_EXPANDED:BREAKDOWN_EXPANDED;
      const sec=document.getElementById(`sec-${which}-${n}`);
      const btn=document.getElementById(`btn-${which}-${n}`);
      if(sec) sec.style.display=expanded?'block':'none';
      if(btn) btn.style.cssText=sectionBtnStyle(expanded);
    });
  });
}function filterTm(){
  if(!window._allTm)return;
  const q=document.getElementById('tmSearch').value.toLowerCase();
  const t=window._allTm.filter(x=>String(x.num).includes(q)||x.name.toLowerCase().includes(q));
  document.getElementById('tmTbl').innerHTML=renderTmTable(t);}

function renderAl(){
  const showEvs=ACTIVE_FILTER.size>0?EVENTS.filter(ev=>ACTIVE_FILTER.has(ev.key)):EVENTS;
  // Sort active event to top, then by week
  const orderedEvs=[...showEvs].sort((a,b)=>{
    const aA=evStatus(a)==='active'?0:1;
    const bA=evStatus(b)==='active'?0:1;
    if(aA!==bA) return aA-bA;
    return a.week-b.week;
  });
  let html=`<div class="sh"><h2>Alliances <span>&</span> Playoffs</h2><span class="sub">All 6 PCH events${filterLabel()}</span></div>`;
  if(ACTIVE_FILTER.size)html+=`<div class="pending-banner" style="background:rgba(0,230,100,.06);border-color:rgba(0,230,100,.3);margin-bottom:16px">🔍 Showing: ${showEvs.map(e=>`<span class="badge ${e.cls}">${e.short}</span>`).join(' ')}</div>`;

let EV_SELECTED=null;

function renderEvPCH(evKey){
  if(!evKey){
    const active=EVENTS.find(ev=>evStatus(ev)==='active');
    const complete=[...EVENTS].reverse().find(ev=>loadedEvents.has(ev.key));
    evKey=EV_SELECTED||(active?.key)||(complete?.key)||EVENTS[0].key;
  }
  EV_SELECTED=evKey;
  const ev=EVENTS.find(e=>e.key===evKey);
  const loaded=loadedEvents.has(evKey);

  const selector=`<select class="ss" id="evStandSel" onchange="renderEv(this.value)" style="margin-bottom:16px">
    ${EVENTS.map(e=>{
      const st=evStatus(e);
      const label=st==='active'?' ● LIVE':st==='complete'?' ✓':'';
      return`<option value="${e.key}" ${e.key===evKey?'selected':''}${!loadedEvents.has(e.key)?' disabled':''}>${e.name}${label}</option>`;
    }).join('')}
  </select>`;

  if(!loaded){
    document.getElementById('pg-standings').innerHTML=`
<div class="sh"><h2>Event <span>Standings</span></h2><span class="sub">${ev?.name||evKey}</span></div>
${selector}
<div class="pending-banner">No data loaded for this event yet — run a Full Refresh after the event begins.</div>`;
    return;
  }

  const rkData=DB.rankings[evKey]||{};
  const rkList=rkData.rankings||[];
  const soInfo=rkData.sort_order_info||[];   // e.g. [{name:'Ranking Score'},{name:'Avg Match Points'},...]
  const exInfo=rkData.extra_stats_info||[];  // e.g. [{name:'Total Ranking Points'}]
  const fM=allM.filter(m=>m._ev===evKey&&m.comp_level==='qm');
  const isActive=evStatus(ev)==='active';

  // Build column headers from TBA metadata — skip index 0 (Ranking Score, shown separately)
  // soInfo[0] = Ranking Score, soInfo[1+] = per-match metrics (Avg Match, Avg Auto, etc.)
  const metricCols=soInfo.slice(1).map(s=>s.name||s.verbose_name||'');
  const extraCols=exInfo.map(s=>s.name||s.verbose_name||'');  // e.g. Total Ranking Points

  const rows=rkList.map(r=>{
    const tk=`frc${(r.team_key||'').replace('frc','')}`;
    const teamNum=parseInt(tk.replace('frc',''));
    const tc=teamColorByKey(tk);
    const isTrk=isTr(tk);
    // TBA fields
    const rank=r.rank??'–';
    const rec=r.record?`${r.record.wins}-${r.record.losses}-${r.record.ties}`:
              r.wins!=null?`${r.wins}-${r.losses}-${r.ties??0}`:'–';
    const dq=r.dq??0;
    const played=r.matches_played??'–';
    const rs=r.sort_orders?.[0]!=null?r.sort_orders[0].toFixed(2):'–';
    // Only render as many metric cols as TBA has info entries for — sort_orders is padded with zeros
    const metrics=(r.sort_orders||[]).slice(1,metricCols.length+1).map(v=>v!=null?v.toFixed(2):'–');
    const extras=(r.extra_stats||[]).slice(0,extraCols.length).map(v=>v!=null?Number.isInteger(v)?v:v.toFixed(1):'–');
    // Event-specific avg score from match data
    const s=teamStatsF(tk,fM,'qm');
    const avgScore=s.n>0?s.avgS.toFixed(1):'–';
    const avgAuto=s.n>0?s.avgA.toFixed(1):'–';
    // EPA — event-specific from Statbotics
    const epa=getEventEPA(tk,evKey);
    const epaVal=epa?.total!=null?epa.total.toFixed(1):'–';
    const epaAutoVal=epa?.auto!=null?epa.auto.toFixed(1):'–';
    // ACE — season-level (event-specific ACE would need event_perfs lookup)
    const ace=ACE_DATA[teamNum];
    const aceVal=ace?.ace!=null?ace.ace.toFixed(1):'–';
    const confVal=ace?.confidence!=null?Math.round(ace.confidence*100)+'%':'–';
    const confCol=ace?.confidence!=null?(ace.confidence>=0.9?'var(--green)':ace.confidence>=0.75?'#f0c040':'var(--loss)'):'var(--text3)';
    return{rank,tk,teamNum,tc,isTrk,rec,dq,played,rs,metrics,extras,avgScore,avgAuto,epaVal,epaAutoVal,aceVal,confVal,confCol,
      _rank:r.rank??999,_rs:r.sort_orders?.[0]??-1,_played:r.matches_played??0,_avg:s.n>0?s.avgS:-1,_auto:s.n>0?s.avgA:-1,
      _epa:epa?.total??-1,_ace:ACE_DATA[teamNum]?.ace??-1};
  });
  const {col:ec,dir:ed}=SORT.ev;
  if(ec){
    rows.sort((a,b)=>{
      let av,bv;
      if(ec==='rank')   {av=a._rank;bv=b._rank;}
      else if(ec==='rs'){av=a._rs;bv=b._rs;}
      else if(ec==='pld'){av=a._played;bv=b._played;}
      else if(ec==='avg'){av=a._avg;bv=b._avg;}
      else if(ec==='auto'){av=a._auto;bv=b._auto;}
      else if(ec==='epa'){av=a._epa;bv=b._epa;}
      else if(ec==='ace'){av=a._ace;bv=b._ace;}
      else {av=a._rank;bv=b._rank;}
      return(av-bv)*ed;
    });
  }

  const thS=(c,l,sty)=>`<th class="r" style="cursor:pointer;user-select:none;font-size:11px${sty?';'+sty:''}" onclick="setSort('ev','${c}')">${l}</th>`;

  document.getElementById('pg-standings').innerHTML=`
<div class="sh"><h2>Event <span>Standings</span></h2><span class="sub">${ev.name} · ${rkList.length} teams${isActive?` <span style="color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:.06em;margin-left:6px">● LIVE</span>`:''}</span></div>
${selector}
${rkList.length===0
  ? `<div class="pending-banner">Rankings not yet available for this event.</div>`
  : `<div style="display:flex;gap:16px;margin-bottom:8px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase">
      <span style="color:var(--blue)">■ Event data (TBA / Statbotics)</span>
      <span style="color:var(--green)">■ Season data (Statbotics / Peekorobo)</span>
    </div>
    <div class="card" style="padding:0 18px 0"><div class="tw tw-scroll"><table>
  <thead>
    <tr>
      <th style="cursor:pointer;user-select:none" onclick="setSort('ev','rank')">Rank</th>
      <th>Team</th>
      <th class="r" style="color:var(--text3);font-size:11px">W-L-T</th>
      <th class="r" style="color:var(--text3);font-size:11px;cursor:pointer;user-select:none" onclick="setSort('ev','pld')">Pld</th>
      ${thS('rs','RS','color:var(--blue)')}
      ${metricCols.map(c=>`<th class="r" style="cursor:pointer;user-select:none;color:var(--blue);font-size:11px" onclick="setSort('ev','rs')" title="${c}">${c.replace('Avg ','').replace('Average ','')}</th>`).join('')}
      ${extraCols.map(c=>`<th class="r" style="color:var(--blue);font-size:11px" title="${c}">${c.replace('Total ','')}</th>`).join('')}
      ${thS('avg','Avg','color:var(--blue)')}
      ${thS('auto','Auto','color:var(--blue)')}
      <th class="r" style="cursor:pointer;user-select:none;color:var(--green);font-size:11px;border-left:2px solid rgba(0,230,100,.2)" onclick="setSort('ev','epa')" title="EPA Total - season (Statbotics)">EPA</th>
      ${thS('ace','ACE','color:var(--green)')}
      <th class="r" style="color:#b464ff;font-size:11px" title="ACE Confidence (Peekorobo)">Conf</th>
    </tr>
  </thead>
  <tbody>${rows.map(r=>`<tr class="${r.isTrk?'hl':''}" style="${r.tc?'border-left:3px solid '+r.tc.border+';':''}">
    <td><span class="rk ${r.rank<=3?'top':''}">${r.rank}</span></td>
    <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px"><a class="tlink" href="https://www.thebluealliance.com/team/${r.teamNum}" target="_blank" style="${r.tc?'color:'+r.tc.text:''}">${tn(r.tk)}</a><span class="tnsm">${r.teamNum}</span>${r.tc?`<span style="margin-left:5px;font-size:11px;color:${r.tc.text}">★</span>`:''}</td>
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px">${r.rec}</td>
    <td class="r dim" style="font-family:'JetBrains Mono',monospace;font-size:11px">${r.dq}</td>
    <td class="r dim" style="font-family:'JetBrains Mono',monospace;font-size:11px">${r.played}</td>
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)">${r.rs}</td>
    ${r.metrics.map(v=>`<td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue)">${v}</td>`).join('')}
    ${r.extras.map(v=>`<td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue)">${v}</td>`).join('')}
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);font-weight:600">${r.avgScore}</td>
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue)">${r.avgAuto}</td>
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${r.epaVal!=='–'?'var(--green)':'var(--text3)'};border-left:2px solid rgba(0,230,100,.2)">${r.epaVal}</td>
    <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${r.aceVal!=='–'?'var(--green)':'var(--text3)'}">${r.aceVal}</td>

// Helper: get all matches for a specific team from houston season data
function hTeamMatches(teamNum){
  const evKeys=HDB.teamEventKeys[teamNum]||[];
  const matches=[];
  evKeys.forEach(evKey=>{
    const ev=HDB.events[evKey]||{};
    (ev.matches||[]).forEach(m=>{
      matches.push({...m,_hev:evKey,_hevName:ev.eventName||evKey,_hweek:ev.week||0});
    });
  });
  return matches;
}

// Helper: get latest EPA for a team from HDB
function hGetLatestEPA(teamKey){
  const evs=HDB.epa[teamKey]||{};
  const keys=Object.keys(evs);
  if(!keys.length) return null;
  // Return last event's EPA
  return evs[keys[keys.length-1]]||null;
}

// Helper: get latest OPR for a team (most recent event's OPR)
function hGetLatestOPR(teamNum){
  const evKeys=HDB.teamEventKeys[teamNum]||[];
  // Sort by week descending to get most recent first
  const sorted=[...evKeys].sort((a,b)=>(HDB.events[b]?.week||0)-(HDB.events[a]?.week||0));
  for(const evKey of sorted){
    const ev=HDB.events[evKey]||{};
    const oprs=ev.oprs?.oprs||{};
    const val=oprs[`frc${teamNum}`];
    if(val!=null) return val;
  }
  return null;
}

function renderHOv(){

  const divKey=HDB.divisionEventKey||'';

  // ── Helper: get 1002 division stats ──
  function team1002DivStats(){
    const ms=(HDB.divisionEvent?.matches||[]).filter(m=>(m.alliances?.red?.score??-1)>=0);
    let w=0,l=0,t=0,tot=0,n=0;
    ms.forEach(m=>{

// ── Houston stream helpers ──────────────────────────────────────────────────
function editHoustonStream(slot){
  const editDiv=document.getElementById(`hstream-edit-${slot}`);
  const input=document.getElementById(`hstream-input-${slot}`);
  if(!editDiv||!input) return;
  editDiv.style.display='block';
  input.focus();
  input.select();
}
function saveHoustonStream(slot){
  const input=document.getElementById(`hstream-input-${slot}`);
  if(!input) return;
  const raw=input.value.trim();
  if(!raw) return;
  let embedUrl;
  const m=raw.match(/(?:v=|youtu\.be\/|embed\/)([^&?/\s]+)/);
  if(m) embedUrl=`https://www.youtube.com/embed/${m[1]}?autoplay=0`;
  else if(/^[a-zA-Z0-9_-]{11}$/.test(raw)) embedUrl=`https://www.youtube.com/embed/${raw}?autoplay=0`;
  else embedUrl=raw;
  let overrides={};
  try{ overrides=JSON.parse(sessionStorage.getItem('cr_stream_houston')||'{}'); }catch(e){}
  overrides[slot]=embedUrl;
  sessionStorage.setItem('cr_stream_houston', JSON.stringify(overrides));
  const frame=document.getElementById(`hstream-frame-${slot}`);
  if(frame) frame.src=embedUrl;
  else renderHOv(); // re-render to show iframe
  document.getElementById(`hstream-edit-${slot}`).style.display='none';
}

// ── Global Rankings (Houston) ──
function renderHRk(){
  const {col,dir}=SORT.rk;
  let rows=(HDB.teams||[]).map(t=>{
    const teamKey=`frc${t.num}`;
    const ace=HDB.ace[t.num]||null;
    const sbr=HDB.sbRanks?.[t.num]||null;
    const epa=hGetLatestEPA(teamKey);
    const opr=hGetLatestOPR(t.num);
    const tc=teamColor(t.num);
    return{
      ...t, teamKey, ace, sbr, epa, opr, tc,
      _globe: sbr?.rank_global??99999,
      _us:    sbr?.rank_country??99999,
      _epa:   epa?.total??-1,
      _opr:   opr??-1,
      _ace:   ace?.ace??-1,
    };
  });
  if(col){
    rows.sort((a,b)=>{
      let av,bv;
      if(col==='globe')   {av=a._globe;bv=b._globe;}
      else if(col==='us') {av=a._us;bv=b._us;}
      else if(col==='epa'){av=a._epa;bv=b._epa;}
      else if(col==='opr'){av=a._opr;bv=b._opr;}
      else if(col==='ace'){av=a._ace;bv=b._ace;}
      else if(col==='conf'){av=a.ace?.confidence??-1;bv=b.ace?.confidence??-1;}
      else{av=a._globe;bv=b._globe;}
      return(av-bv)*dir;
    });
  }else{
    // Default sort: Statbotics global rank
    rows.sort((a,b)=>a._globe-b._globe);
  }
  const thH=(c,l,cls,sty,title)=>`<th class="${cls||''}" style="cursor:pointer;user-select:none${sty?';'+sty:''}" onclick="setSort('rk','${c}')"${title?` title="${title}"`:''}>${l}</th>`;
  document.getElementById('pg-rankings').innerHTML=`
<div class="sh"><h2>Global <span>Rankings</span></h2><span class="sub">${rows.length} teams · 2026 Houston</span></div>
<div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:8px;padding:0 2px">

// ── Scoring Analysis (Houston) — Top 20 from season history + division when available ──
function renderHSc(){
  const divMatches=(HDB.divisionEvent?.matches||[]);
  const hasDivData=divMatches.filter(m=>(m.alliances?.red?.score??-1)>=0).length>0;
  const hasTracked=H_TRACKED_FILTER.size>0;

  // Source: division > tracked teams from hallM > all hallM
  let sourceMatches, sourceLabel;
  if(hasDivData){
    // Championship has started — use division matches, filtered to tracked if applicable
    sourceMatches=hasDivData&&hasTracked
      ? divMatches.filter(m=>{
          const keys=[...(m.alliances?.red?.team_keys||[]),...(m.alliances?.blue?.team_keys||[])];
          return keys.some(k=>H_TRACKED_FILTER.has(parseInt(k.replace('frc',''))));
        })
      : divMatches;
    sourceLabel=hasTracked?`${HDB.division} · ${H_TRACKED_FILTER.size} tracked teams`:HDB.division;
  } else {
    // Pre-championship — use hallM filtered to tracked teams if any selected
    sourceMatches=hasTracked
      ? hallM.filter(m=>{
          const keys=[...(m.alliances?.red?.team_keys||[]),...(m.alliances?.blue?.team_keys||[])];
          return keys.some(k=>H_TRACKED_FILTER.has(parseInt(k.replace('frc',''))));
        })
      : hallM;
    sourceLabel=hasTracked
      ? `Season History · ${H_TRACKED_FILTER.size} tracked team${H_TRACKED_FILTER.size!==1?'s':''}`
      : 'Season History (all 76 teams)';
  }

  const useMatches=MATCH_TYPE==='qm'?sourceMatches.filter(m=>m.comp_level==='qm'):MATCH_TYPE==='po'?sourceMatches.filter(m=>m.comp_level!=='qm'):sourceMatches;
  const played=useMatches.filter(m=>(m.alliances?.red?.score??-1)>=0);
  const margins=played.map(m=>Math.abs((m.alliances?.red?.score||0)-(m.alliances?.blue?.score||0)));
  const avgMar=margins.length?margins.reduce((s,v)=>s+v,0)/margins.length:0;
  const close=margins.filter(v=>v<=10).length;
  const blow=margins.filter(v=>v>40).length;

  // Top 20 matches by winning alliance score — one row per match
  const topRows=[];
  played.forEach(m=>{
    const rs=m.alliances?.red?.score??-1;
    const bs=m.alliances?.blue?.score??-1;
    if(rs<0&&bs<0) return;
    const winSc=Math.max(rs,bs);
    const evShort=(m._hev||m._ev||'DIV').replace('2026','').toUpperCase();
    topRows.push({m,winSc,rs,bs,evShort});
  });
  topRows.sort((a,b)=>b.winSc-a.winSc);
  const scLabel=MATCH_TYPE==='qm'?'Quals':MATCH_TYPE==='po'?'Playoffs':'All';
  document.getElementById('pg-scoring').innerHTML=`
<div class="sh"><h2>Scoring <span>Analysis</span></h2><span class="sub">${sourceLabel} · ${played.length} ${scLabel.toLowerCase()} matches</span></div>
${!hasDivData?`<div class="pending-banner" style="background:rgba(56,168,255,.06);border-color:rgba(56,168,255,.3);margin-bottom:16px">${hasTracked?`Showing pre-season data for ${H_TRACKED_FILTER.size} tracked team${H_TRACKED_FILTER.size!==1?'s':''}. Division scoring will appear once the event begins.`:'Showing 2026 pre-season data for all 76 Houston teams. Division scoring will appear here once the event begins.'}</div>`:''}
<div class="g3" style="margin-bottom:16px">
  <div class="metric"><div class="mlabel">Avg Margin of Victory</div><div class="mval" style="color:var(--loss)">${avgMar.toFixed(1)}</div><div class="msub">points</div></div>
  <div class="metric"><div class="mlabel">Close Matches (≤10 pts)</div><div class="mval" style="color:var(--win)">${close}</div><div class="msub">of ${margins.length} decided</div></div>
  <div class="metric"><div class="mlabel">Blowouts (>40 pts)</div><div class="mval" style="color:var(--orange)">${blow}</div><div class="msub">of ${margins.length} decided</div></div>
</div>
<div class="card"><div class="ctitle">Top 20 Single-Alliance Scores — ${scLabel} · ${sourceLabel} <span style="font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-weight:400;margin-left:6px">click row to expand breakdown</span></div>
  <div class="tw"><table>
    <thead><tr>
      <th>#</th><th>Event</th><th>Match</th><th></th>
      <th style="color:rgba(255,61,90,.7)">Red Alliance</th>
      <th class="r" style="color:var(--loss)">Red</th>
      <th></th>
      <th style="color:var(--blue)">Blue</th>
      <th style="color:rgba(56,168,255,.7)">Blue Alliance</th>
      <th class="r">Winner</th>
    </tr></thead>
    <tbody>${topRows.slice(0,20).map((row,i)=>{
      const m=row.m;
      const rWin=m.winning_alliance==='red', bWin=m.winning_alliance==='blue';
      const bdId=`hsc-bd-${i}`;
      const redKeys=m.alliances?.red?.team_keys||[];
      const blueKeys=m.alliances?.blue?.team_keys||[];
      const rt=redKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${k.replace('frc','')}</span>`;}).join(' · ');
      const bt=blueKeys.map(k=>{const tc=teamColorByKey(k);return`<span style="${tc?'color:'+tc.text+';font-weight:600':''}">${k.replace('frc','')}</span>`;}).join(' · ');
      const hasT=[...redKeys,...blueKeys].some(k=>isTr(k));
      const bdPanel=(()=>{
        const rhs=hubS(m,'red'), bhs=hubS(m,'blue');
        if(!rhs&&!bhs) return '';
        const bdPhases=[
          {label:'Auto',      k:'auto',      col:'var(--blue)'},
          {label:'Transition',k:'transition',col:'var(--text2)'},
          {label:'Sh 1 / 2', k1:'s1',k2:'s2',col:'#a78bfa'},
          {label:'Sh 3 / 4', k1:'s3',k2:'s4',col:'#a78bfa'},
          {label:'Endgame',   k:'endgame',   col:'var(--orange)'},
          {label:'Teleop',    k:'teleop',    col:'#00c8aa',sub:true},
          {label:'Total',     k:'total',     col:'var(--green)',total:true},
        ];
        const f=(hs,p)=>p.k1!=null?((hs?hs[p.k1]:0)||0)+((hs?hs[p.k2]:0)||0):(hs?hs[p.k]:0)||0;

        const makeRow=(p)=>{
          const rv=f(rhs,p),bv=f(bhs,p);
          const isTotal=!!p.total,isSub=!!p.sub;
          const pctR=Math.round((rv/maxV)*100),pctB=Math.round((bv/maxV)*100);
          const rCol=rWin&&isTotal?'var(--loss)':rv>bv?'rgba(255,100,100,.9)':'var(--text3)';
          const bCol=bWin&&isTotal?'var(--blue)':bv>rv?'rgba(80,180,255,.9)':'var(--text3)';
          const barR=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctR}%;height:100%;background:var(--loss);opacity:${rWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;right:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${rCol}">${rv}</div></div>`;
          const barB=`<div style="flex:1;background:var(--bg3);border-radius:3px;height:${isTotal?'20':'16'}px;overflow:hidden;position:relative"><div style="width:${pctB}%;height:100%;background:var(--blue);opacity:${bWin&&isTotal?'.35':'.2'};border-radius:3px;position:absolute;left:0;top:0"></div><div style="position:absolute;inset:0;display:flex;align-items:center;padding-left:7px;font-family:'JetBrains Mono',monospace;font-size:${isTotal?'13':'11'}px;font-weight:${isTotal||isSub?700:400};color:${bCol}">${bv}</div></div>`;
          const topStyle=isTotal?'padding-top:8px;border-top:1px solid var(--border);margin-top:6px':isSub?'padding-top:5px;border-top:1px dashed rgba(255,255,255,.1);margin-top:2px;margin-bottom:4px':'margin-bottom:4px';
          return`<div style="display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;gap:8px;${topStyle}">${barR}<div style="text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:${isTotal||isSub?900:700};font-size:${isTotal?'11':'10'}px;letter-spacing:.08em;text-transform:uppercase;color:${isTotal?'var(--text2)':p.col}">${p.label}${isSub?'<div style="font-size:8px;font-weight:400;color:var(--text3);letter-spacing:.04em;margin-top:1px">subtotal</div>':''}</div>${barB}</div>`;
        };
        return`<tr id="${bdId}" class="mx-bd"><td colspan="10" style="padding:0"><div style="padding:14px 24px 16px">
          <div style="display:grid;grid-template-columns:1fr 90px 1fr;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)">
            <div style="text-align:right;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${rWin?'var(--loss)':'var(--text3)'}">RED ALLIANCE</div>
            <div></div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:.1em;color:${bWin?'var(--blue)':'var(--text3)'}">BLUE ALLIANCE</div>
          </div>
          ${bdPhases.map(makeRow).join('')}
          <div style="margin-top:10px;text-align:right;font-size:9px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;text-transform:uppercase">Alliance totals · click row to close</div>
        </div></td></tr>`;
      })();
      const clickable=bdPanel?`style="cursor:pointer" onclick="const r=document.getElementById('${bdId}');if(r)r.classList.toggle('open')"` :'';
      return`<tr ${clickable}>
        <td class="dim">${i+1}</td>
        <td class="dim" style="font-size:10px;font-family:'JetBrains Mono',monospace;white-space:nowrap">${row.evShort}</td>
        <td class="dim" style="white-space:nowrap">${m.comp_level==='qm'?'QM'+m.match_number:`${m.comp_level.toUpperCase()} ${m.set_number}-${m.match_number}`} ${videoLink(matchVideoUrl(m))}</td>
        <td></td>
        <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${rWin?'background:rgba(255,61,90,.04)':''}">${rt}</td>
        <td class="r" style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:${rWin?700:400};color:${rWin?'var(--loss)':'var(--text3)'};${rWin?'background:rgba(255,61,90,.04)':''}">${row.rs>=0?row.rs:'–'}</td>
        <td style="text-align:center;color:var(--text3);font-size:10px;padding:0 2px">–</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:${bWin?700:400};color:${bWin?'var(--blue)':'var(--text3)'};${bWin?'background:rgba(56,168,255,.04)':''}">${row.bs>=0?row.bs:'–'}</td>
        <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${bWin?'background:rgba(56,168,255,.04)':''}">${bt}</td>
        <td class="r"><span class="badge" style="background:${rWin?'rgba(255,61,90,.15)':bWin?'rgba(56,168,255,.15)':'var(--bg3)'};color:${rWin?'var(--loss)':bWin?'var(--blue)':'var(--text3)'}">${m.winning_alliance?m.winning_alliance.toUpperCase():'–'}</span></td>
      </tr>${bdPanel}`;
    }).join('')}</tbody>
  </table></div>
</div>`;
}
